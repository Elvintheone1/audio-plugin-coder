<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Splice</title>
  <style>
    :root {
      --bg:           #1A1A1A;
      --bg-block:     #252525;
      --bg-cell-off:  #141414;
      --bg-panel:     #222222;
      --border:       #333333;
      --hover:        #2A2A2A;

      --s1:     #D4604A;
      --s1-lit: #DF8C7A;
      --s2:     #4A7BA8;
      --s2-lit: #7AA0C0;
      --s3:     #5A8A6A;
      --s3-lit: #84A892;
      --s4:     #B87888;
      --s4-lit: #CDA4B0;

      --seq-lit:  #4A8AA8;

      --text:    #E8E8E8;
      --text-2:  #888888;
      --text-3:  #555555;
      --tab-bg:  #2E6B8A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Inter, sans-serif;
      width: 1000px;
      height: 600px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── TOP BAR ─────────────────────────────────────────── */
    .top-bar {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
    }

    .plugin-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .reel-name {
      font-size: 12px;
      color: var(--text-2);
      margin-left: 14px;
    }

    .page-tabs {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .page-tab {
      padding: 5px 18px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-2);
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.1s, color 0.1s;
    }
    .page-tab.active {
      background: var(--tab-bg);
      color: var(--text);
    }

    .mode-group {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .mode-btn {
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }
    .mode-btn.active {
      color: var(--text);
      border-color: var(--border);
    }

    .mode-sep {
      width: 1px;
      height: 14px;
      background: var(--border);
      margin: 0 6px;
    }

    /* SEQ power toggle */
    .seq-power {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--text-3);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 6px;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }
    .seq-power::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-3);
      transition: background 0.15s;
    }
    .seq-power.active {
      border-color: var(--seq-lit);
      box-shadow: 0 0 6px var(--seq-lit);
    }
    .seq-power.active::after {
      background: var(--seq-lit);
    }

    /* Hold button */
    .hold-btn {
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
    }
    .hold-btn.active {
      color: var(--text);
      border-color: #C08030;
      background: rgba(192,128,48,0.12);
    }

    /* Debug status */
    #debug-status {
      font-size: 8px;
      color: var(--text-3);
      letter-spacing: 0.08em;
      margin-right: 10px;
    }

    /* ── PAGES ───────────────────────────────────────────── */
    .page { display: none; flex-direction: column; height: calc(600px - 52px); }
    .page.active { display: flex; }

    /* ── GRID AREA ───────────────────────────────────────── */
    .grid-area {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 28px 12px;
      gap: 14px;
      min-height: 0;
    }

    /* ── SECTION BLOCKS (Loop page) ──────────────────────── */
    .section-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-block);
      border-radius: 4px;
      overflow: hidden;
    }

    .section-header {
      padding: 7px 9px 4px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      flex-shrink: 0;
    }

    .section-cells {
      display: grid;
      gap: 3px;
      padding: 7px;
      width: 100%;
      aspect-ratio: 1;
    }

    .cell {
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.06s;
    }
    .cell.off { background: var(--bg-cell-off); }

    .s1 .cell.on      { background: var(--s1); }
    .s1 .cell.on.lit  { background: var(--s1-lit); }
    .s1 .cell.off.lit { background: var(--bg-cell-off); border: 1.5px solid var(--s1-lit); }
    .s2 .cell.on      { background: var(--s2); }
    .s2 .cell.on.lit  { background: var(--s2-lit); }
    .s2 .cell.off.lit { background: var(--bg-cell-off); border: 1.5px solid var(--s2-lit); }
    .s3 .cell.on      { background: var(--s3); }
    .s3 .cell.on.lit  { background: var(--s3-lit); }
    .s3 .cell.off.lit { background: var(--bg-cell-off); border: 1.5px solid var(--s3-lit); }
    .s4 .cell.on      { background: var(--s4); }
    .s4 .cell.on.lit  { background: var(--s4-lit); }
    .s4 .cell.off.lit { background: var(--bg-cell-off); border: 1.5px solid var(--s4-lit); }

    /* ── CONTROLS AREA (Loop page) ───────────────────────── */
    .controls-area {
      height: 160px;
      display: flex;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ctrl-panel {
      flex: 1;
      padding: 13px 22px 10px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .ctrl-panel + .ctrl-panel { border-left: 1px solid var(--border); }

    .ctrl-tabs {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .ctrl-tab {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 2px;
      transition: background 0.1s, color 0.1s;
    }
    .ctrl-tab.active {
      color: var(--text);
      background: var(--hover);
    }
    .ctrl-tab-sep {
      color: var(--text-3);
      font-size: 9px;
      padding: 0 2px;
    }

    .ctrl-body { display: none; }
    .ctrl-body.active { display: flex; gap: 24px; align-items: flex-start; }

    /* Direction groups */
    .dir-group { display: flex; flex-direction: column; gap: 5px; }
    .dir-group-label {
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .dir-btns { display: flex; gap: 4px; }

    .dir-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: var(--hover);
      border: 1px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      color: var(--text-3);
      transition: border-color 0.1s, color 0.1s;
    }
    .dir-btn.active {
      border-color: #555;
      color: var(--text);
    }

    /* Grid control */
    .grid-group { display: flex; flex-direction: column; gap: 5px; }
    .grid-display {
      font-size: 26px;
      font-weight: 300;
      color: var(--text);
      cursor: ns-resize;
    }

    /* Envelope icon controls */
    .env-controls { display: flex; gap: 22px; align-items: flex-end; }
    .env-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }

    .env-icon {
      display: block;
      cursor: ns-resize;
      opacity: 0.6;
      transition: opacity 0.1s;
    }
    .env-icon:hover { opacity: 0.85; }
    .env-icon.dragging { opacity: 1; }

    .env-line {
      stroke: var(--text-2);
      stroke-width: 1.5;
      stroke-linecap: round;
    }
    .env-icon.dragging .env-line { stroke: var(--text); }

    .env-label {
      font-size: 9px;
      color: var(--text-2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Filter controls */
    .filter-controls { display: flex; flex-direction: column; gap: 8px; }
    .filter-row { display: flex; gap: 16px; align-items: center; }
    .filter-param { display: flex; flex-direction: column; gap: 4px; }
    .filter-label { font-size: 9px; color: var(--text-2); letter-spacing: 0.06em; text-transform: uppercase; }
    input[type=range].hslider { width: 100px; cursor: pointer; accent-color: var(--text-2); }
    .filter-type-btns { display: flex; gap: 3px; }
    .ftype-btn {
      padding: 3px 8px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--hover);
      border: 1px solid transparent;
      border-radius: 2px;
      color: var(--text-3);
      cursor: pointer;
    }
    .ftype-btn.active { border-color: #555; color: var(--text); }

    /* ── LANE BLOCKS (SEQ page) ──────────────────────────── */
    .lane-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-block);
      border-radius: 4px;
      overflow: hidden;
    }

    .lane-header {
      padding: 7px 9px 4px;
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-shrink: 0;
    }
    .lane-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }
    .lane-val {
      font-size: 10px;
      color: var(--text-2);
      margin-left: auto;
    }

    .lane-cells {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 3px;
      padding: 7px;
      aspect-ratio: 1;
      overflow: hidden;
    }

    .lcell {
      border-radius: 2px;
      cursor: ns-resize;
      aspect-ratio: 1;
    }
    .lcell.lit      { background: var(--seq-lit); }
    .lcell.inactive { background: var(--bg-cell-off); cursor: default; }

    .step-val, .speed-val { cursor: ns-resize; user-select: none; -webkit-user-select: none; }
    .step-val:hover, .speed-val:hover { color: var(--text); }
    #page-seq .grid-area  { align-items: flex-start; }
    #page-loop .grid-area { align-items: flex-start; }

    .lane-footer {
      padding: 6px 9px;
      display: flex;
      gap: 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .lane-meta { display: flex; flex-direction: column; gap: 2px; }
    .lane-meta-label {
      font-size: 8px;
      color: var(--text-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .lane-meta-value { font-size: 10px; color: var(--text); }

    /* ── SEQ GLOBAL BAR ──────────────────────────────────── */
    .seq-bar {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 36px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .seq-item { display: flex; align-items: center; gap: 8px; }
    .seq-item-label { font-size: 9px; color: var(--text-2); letter-spacing: 0.06em; text-transform: uppercase; }
    .seq-item-value { font-size: 12px; color: var(--text); }

    .gen-btns { margin-left: auto; display: flex; gap: 4px; }
    .gen-btn {
      padding: 4px 10px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--hover);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-2);
      cursor: pointer;
    }
    .gen-btn:hover { color: var(--text); border-color: #555; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="plugin-title">Splice</span>
  <span class="reel-name" id="reel-name">no reel loaded</span>

  <div class="page-tabs">
    <button class="page-tab active" id="tab-loop" onclick="switchPage('loop', this)">Loop</button>
    <button class="page-tab" id="tab-seq" onclick="switchPage('seq', this)">Seq</button>
    <button class="seq-power" id="seq-power" onclick="toggleSeq()" title="Sequencer on/off"></button>
  </div>

  <div class="mode-group">
    <span id="debug-status">INIT</span>
    <button class="mode-btn active" id="mode-poly"  onclick="setMode(0)">Poly</button>
    <button class="mode-btn"        id="mode-slice" onclick="setMode(1)">Slice</button>
    <button class="mode-btn"        id="mode-arp"   onclick="setMode(2)">Arp</button>
    <div class="mode-sep"></div>
    <button class="hold-btn" id="hold-btn" onclick="toggleHold()">Hold</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ -->
<!-- LOOP PAGE                                              -->
<!-- ═══════════════════════════════════════════════════════ -->
<div class="page active" id="page-loop">

  <div class="grid-area">

    <!-- Section I -->
    <div class="section-block s1">
      <div class="section-header">I</div>
      <div class="section-cells" id="cells-s1"></div>
    </div>

    <!-- Section II -->
    <div class="section-block s2">
      <div class="section-header">II</div>
      <div class="section-cells" id="cells-s2"></div>
    </div>

    <!-- Section III -->
    <div class="section-block s3">
      <div class="section-header">III</div>
      <div class="section-cells" id="cells-s3"></div>
    </div>

    <!-- Section IV -->
    <div class="section-block s4">
      <div class="section-header">IV</div>
      <div class="section-cells" id="cells-s4"></div>
    </div>

  </div><!-- /grid-area -->

  <!-- CONTROLS AREA -->
  <div class="controls-area">

    <!-- Left panel -->
    <div class="ctrl-panel">
      <div class="ctrl-tabs">
        <button class="ctrl-tab active" onclick="switchCtrl(this,'playhead-body')">Playhead</button>
        <span class="ctrl-tab-sep">/</span>
        <button class="ctrl-tab" onclick="switchCtrl(this,'signal-body')">Signal</button>
        <span class="ctrl-tab-sep">/</span>
        <button class="ctrl-tab" onclick="switchCtrl(this,'random-body')">Random</button>
      </div>

      <!-- Playhead body -->
      <div class="ctrl-body active" id="playhead-body">
        <div class="dir-group">
          <div class="dir-group-label">Reel</div>
          <div class="dir-btns" id="reel-dir-btns">
            <button class="dir-btn active" onclick="setDir('reel',0)">→</button>
            <button class="dir-btn" onclick="setDir('reel',1)">←</button>
            <button class="dir-btn" onclick="setDir('reel',2)">↔</button>
            <button class="dir-btn" onclick="setDir('reel',3)">∿</button>
          </div>
        </div>
        <div class="dir-group">
          <div class="dir-group-label">Slice</div>
          <div class="dir-btns" id="slice-dir-btns">
            <button class="dir-btn active" onclick="setDir('slice',0)">→</button>
            <button class="dir-btn" onclick="setDir('slice',1)">←</button>
            <button class="dir-btn" onclick="setDir('slice',2)">↔</button>
            <button class="dir-btn" onclick="setDir('slice',3)">∿</button>
          </div>
        </div>
        <div class="grid-group">
          <div class="dir-group-label">Grid</div>
          <div class="grid-display" id="grid-display">/4</div>
        </div>
      </div>

      <!-- Signal body (placeholder) -->
      <div class="ctrl-body" id="signal-body">
        <span style="font-size:10px;color:var(--text-2)">Signal processing — v2</span>
      </div>

      <!-- Random body (placeholder) -->
      <div class="ctrl-body" id="random-body">
        <span style="font-size:10px;color:var(--text-2)">Randomization — v2</span>
      </div>
    </div>

    <!-- Right panel -->
    <div class="ctrl-panel">
      <div class="ctrl-tabs">
        <button class="ctrl-tab active" onclick="switchCtrl(this,'ampenv-body')">Amp Env</button>
        <span class="ctrl-tab-sep">/</span>
        <button class="ctrl-tab" onclick="switchCtrl(this,'filter-body')">Filter</button>
        <span class="ctrl-tab-sep">/</span>
        <button class="ctrl-tab" onclick="switchCtrl(this,'fenv-body')">Filter Env</button>
      </div>

      <!-- Amp Env body -->
      <div class="ctrl-body active" id="ampenv-body">
        <div class="env-controls">
          <div class="env-item">
            <svg class="env-icon" data-type="attack" data-param="amp_attack" data-value="0.05" viewBox="0 0 36 60" width="36" height="60">
              <line class="env-line" x1="6" y1="54" x2="6" y2="6"/>
            </svg>
            <div class="env-label">Attack</div>
          </div>
          <div class="env-item">
            <svg class="env-icon" data-type="decay" data-param="amp_decay" data-value="0.4" viewBox="0 0 36 60" width="36" height="60">
              <line class="env-line" x1="6" y1="6" x2="6" y2="54"/>
            </svg>
            <div class="env-label">Decay</div>
          </div>
          <div class="env-item">
            <svg class="env-icon" data-type="sustain" data-param="amp_sustain" data-value="1.0" viewBox="0 0 36 60" width="36" height="60">
              <line class="env-line" x1="6" y1="6" x2="30" y2="6"/>
            </svg>
            <div class="env-label">Sustain</div>
          </div>
          <div class="env-item">
            <svg class="env-icon" data-type="release" data-param="amp_release" data-value="0.2" viewBox="0 0 36 60" width="36" height="60">
              <line class="env-line" x1="6" y1="6" x2="6" y2="54"/>
            </svg>
            <div class="env-label">Release</div>
          </div>
        </div>
      </div>

      <!-- Filter body -->
      <div class="ctrl-body" id="filter-body">
        <div class="filter-controls">
          <div class="filter-row">
            <div class="filter-param">
              <div class="filter-label">Cutoff</div>
              <input class="hslider" id="cutoff-slider" type="range" min="0" max="100" value="90">
            </div>
            <div class="filter-param">
              <div class="filter-label">Res</div>
              <input class="hslider" id="res-slider" type="range" min="0" max="100" value="10">
            </div>
          </div>
          <div class="filter-type-btns" id="filter-type-btns">
            <button class="ftype-btn active" onclick="setFilterType(0)">LP</button>
            <button class="ftype-btn" onclick="setFilterType(1)">BP</button>
            <button class="ftype-btn" onclick="setFilterType(2)">HP</button>
          </div>
        </div>
      </div>

      <!-- Filter Env body -->
      <div class="ctrl-body" id="fenv-body">
        <div class="env-controls">
          <div class="env-item">
            <svg class="env-icon" data-type="depth" data-param="fenv_depth" data-value="0" viewBox="0 0 36 60" width="36" height="60">
              <line class="env-line" x1="6" y1="30" x2="30" y2="30"/>
            </svg>
            <div class="env-label">Depth</div>
          </div>
          <div class="env-item">
            <svg class="env-icon" data-type="attack" data-param="fenv_attack" data-value="0.1" viewBox="0 0 36 60" width="36" height="60">
              <line class="env-line" x1="6" y1="54" x2="6" y2="6"/>
            </svg>
            <div class="env-label">Attack</div>
          </div>
          <div class="env-item">
            <svg class="env-icon" data-type="decay" data-param="fenv_decay" data-value="0.5" viewBox="0 0 36 60" width="36" height="60">
              <line class="env-line" x1="6" y1="6" x2="6" y2="54"/>
            </svg>
            <div class="env-label">Decay</div>
          </div>
        </div>
      </div>

    </div><!-- /ctrl-panel right -->

  </div><!-- /controls-area -->

</div><!-- /page-loop -->

<!-- ═══════════════════════════════════════════════════════ -->
<!-- SEQ PAGE                                               -->
<!-- ═══════════════════════════════════════════════════════ -->
<div class="page" id="page-seq">

  <div class="grid-area">

    <!-- POS lane -->
    <div class="lane-block" data-lane="pos">
      <div class="lane-header">
        <span class="lane-name">Pos</span>
        <span class="lane-val" id="pos-val">8 / 16</span>
      </div>
      <div class="lane-cells" id="lane-pos"></div>
      <div class="lane-footer">
        <div class="lane-meta"><div class="lane-meta-label">Steps</div><div class="lane-meta-value step-val" data-lane="pos" data-steps="16">16</div></div>
        <div class="lane-meta"><div class="lane-meta-label">Speed</div><div class="lane-meta-value speed-val" data-lane="pos" data-speed="16">*16</div></div>
      </div>
    </div>

    <!-- VEL lane -->
    <div class="lane-block" data-lane="vel">
      <div class="lane-header">
        <span class="lane-name">Vel</span>
        <span class="lane-val" id="vel-val">75%</span>
      </div>
      <div class="lane-cells" id="lane-vel"></div>
      <div class="lane-footer">
        <div class="lane-meta"><div class="lane-meta-label">Steps</div><div class="lane-meta-value step-val" data-lane="vel" data-steps="12">12</div></div>

    <div class="lane-block" data-lane="pitch">

        <div class="lane-meta"><div class="lane-meta-label">Steps</div><div class="lane-meta-value step-val" data-lane="pitch" data-steps="9">9</div></div>

        <div class="lane-meta"><div class="lane-meta-label">Speed</div><div class="lane-meta-value speed-val" data-lane="dir" data-speed="4">*4</div></div>

<!-- ALL JS INLINED — WKWebView resource provider doesn't support ES module imports -->
<script>
(function() {
    'use strict';

    // ================================================================
    // JUCE BRIDGE (inlined — matches BeadyEye pattern)
    // ================================================================

    var juceAvailable = typeof window.__JUCE__ !== 'undefined';

    function SliderState(name) {
        this.name = name;
        this.identifier = '__juce__slider' + name;
        this.scaledValue = 0;
        this.properties = { start: 0, end: 1, skew: 1, name: '', label: '', numSteps: 100, interval: 0, parameterIndex: -1 };
        this.valueChangedListeners = [];
        var self = this;
        if (juceAvailable && window.__JUCE__.backend) {
            window.__JUCE__.backend.addEventListener(this.identifier, function(e) { self.handleEvent(e); });
            window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'requestInitialUpdate' });
        }
    }
    SliderState.prototype.setNormalisedValue = function(v) {
        this.scaledValue = this.snapToLegalValue(this.normalisedToScaledValue(v));
        if (juceAvailable && window.__JUCE__.backend)
            window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'valueChanged', value: this.scaledValue });
    };
    SliderState.prototype.sliderDragStarted = function() {
        if (juceAvailable && window.__JUCE__.backend)
            window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'sliderDragStarted' });
    };
    SliderState.prototype.sliderDragEnded = function() {
        if (juceAvailable && window.__JUCE__.backend)
            window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'sliderDragEnded' });
    };
    SliderState.prototype.handleEvent = function(event) {
        if (event.eventType === 'valueChanged') {
            this.scaledValue = event.value;
            this.valueChangedListeners.forEach(function(fn) { fn(); });
        }
        if (event.eventType === 'propertiesChanged') {
            var props = {};
            for (var k in event) { if (k !== 'eventType') props[k] = event[k]; }
            this.properties = props;
        }
    };
    SliderState.prototype.getScaledValue = function() { return this.scaledValue; };
    SliderState.prototype.getNormalisedValue = function() {
        return Math.pow(
            (this.scaledValue - this.properties.start) / (this.properties.end - this.properties.start),
            this.properties.skew
        );
    };
    SliderState.prototype.normalisedToScaledValue = function(v) {
        return Math.pow(v, 1 / this.properties.skew) * (this.properties.end - this.properties.start) + this.properties.start;
    };
    SliderState.prototype.snapToLegalValue = function(v) {
        var i = this.properties.interval;
        if (i === 0) return v;
        var s = this.properties.start;
        return Math.max(s, Math.min(this.properties.end, s + i * Math.floor((v - s) / i + 0.5)));
    };
    SliderState.prototype.addValueChangedListener = function(fn) { this.valueChangedListeners.push(fn); };

    function ToggleState(name) {
        this.name = name;
        this.identifier = '__juce__toggle' + name;
        this.value = false;
        this.valueChangedListeners = [];
        var self = this;
        if (juceAvailable && window.__JUCE__.backend) {
            window.__JUCE__.backend.addEventListener(this.identifier, function(e) { self.handleEvent(e); });
            window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'requestInitialUpdate' });
        }
    }
    ToggleState.prototype.getValue  = function() { return this.value; };
    ToggleState.prototype.setValue  = function(v) {
        this.value = !!v;
        if (juceAvailable && window.__JUCE__.backend)
            window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'valueChanged', value: this.value });
    };
    ToggleState.prototype.handleEvent = function(event) {
        if (event.eventType === 'valueChanged') {
            this.value = !!event.value;
            this.valueChangedListeners.forEach(function(fn) { fn(); });
        }
    };
    ToggleState.prototype.addValueChangedListener = function(fn) { this.valueChangedListeners.push(fn); };

    var sliderStates = {}, toggleStates = {};
    window.Juce = window.Juce || {};
    window.Juce.getSliderState = function(name) {
        if (!sliderStates[name]) sliderStates[name] = new SliderState(name);
        return sliderStates[name];
    };
    window.Juce.getToggleState = function(name) {
        if (!toggleStates[name]) toggleStates[name] = new ToggleState(name);
        return toggleStates[name];
    };

    // ================================================================
    // SPLICE — Parameter state
    // ================================================================

    // Toggle params (bool)
    var TOGGLE_PARAMS = { arp_hold: true };

    var parameterStates = {
        amp_attack: null, amp_decay: null, amp_sustain: null, amp_release: null,
        filter_cutoff: null, filter_res: null, filter_type: null,
        fenv_depth: null, fenv_attack: null, fenv_decay: null,
        output_vol: null,
        grid: null,
        playback_mode: null,
        reel_dir: null, slice_dir: null,
        arp_hold: null
    };

    var knobUpdaters = {};

    // Called from C++ timer via evaluateJavascript
    window.updateReelName = function(name) {
        var el = document.getElementById('reel-name');
        if (el) el.textContent = name || 'no reel loaded';
    };

    // ================================================================
    // PAGE SWITCHING
    // ================================================================

    window.switchPage = function(name, btn) {
        document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
        document.querySelectorAll('.page-tab').forEach(function(t) { t.classList.remove('active'); });
        document.getElementById('page-' + name).classList.add('active');
        btn.classList.add('active');
    };

    // ================================================================
    // MODE BUTTONS (playback_mode: 0=poly, 1=slice, 2=arp, 3=seq via SEQ power)
    // ================================================================

    var modeBtns = [];
    window.setMode = function(idx) {
        modeBtns.forEach(function(b, i) { b.classList.toggle('active', i === idx); });
        if (parameterStates.playback_mode)
            try { parameterStates.playback_mode.sliderDragStarted();
                  parameterStates.playback_mode.setNormalisedValue(idx / 3);
                  parameterStates.playback_mode.sliderDragEnded(); } catch(e) {}
    };
    knobUpdaters['playback_mode'] = function(norm) {
        var idx = Math.round(norm * 3);
        modeBtns.forEach(function(b, i) { b.classList.toggle('active', i === idx); });
    };

    // ================================================================
    // SEQ POWER (toggle seq mode on/off)
    // ================================================================

    var seqActive = false;
    window.toggleSeq = function() {
        seqActive = !seqActive;
        document.getElementById('seq-power').classList.toggle('active', seqActive);
        // Sync to playback_mode: 3=seq when on, 0=poly when off
        if (parameterStates.playback_mode)
            try { parameterStates.playback_mode.setNormalisedValue(seqActive ? 1.0 : 0.0); } catch(e) {}
    };

    // ================================================================
    // HOLD BUTTON (arp_hold)
    // ================================================================

    var holdActive = false;
    window.toggleHold = function() {
        holdActive = !holdActive;
        document.getElementById('hold-btn').classList.toggle('active', holdActive);
        if (parameterStates.arp_hold)
            try { parameterStates.arp_hold.setValue(holdActive); } catch(e) {}
    };
    knobUpdaters['arp_hold'] = function(v) {
        holdActive = v > 0.5;
        document.getElementById('hold-btn').classList.toggle('active', holdActive);
    };

    // ================================================================
    // DIRECTION BUTTONS (reel_dir, slice_dir: 0=fwd,1=rev,2=pingpong,3=random)
    // ================================================================

    window.setDir = function(group, idx) {
        var containerId = group === 'reel' ? 'reel-dir-btns' : 'slice-dir-btns';
        var paramId     = group === 'reel' ? 'reel_dir'      : 'slice_dir';
        var container   = document.getElementById(containerId);
        if (!container) return;
        container.querySelectorAll('.dir-btn').forEach(function(b, i) {
            b.classList.toggle('active', i === idx);
        });
        if (parameterStates[paramId])
            try { parameterStates[paramId].sliderDragStarted();
                  parameterStates[paramId].setNormalisedValue(idx / 3);
                  parameterStates[paramId].sliderDragEnded(); } catch(e) {}
    };
    knobUpdaters['reel_dir'] = function(norm) {
        var idx = Math.round(norm * 3);
        var container = document.getElementById('reel-dir-btns');
        if (container) container.querySelectorAll('.dir-btn').forEach(function(b, i) {
            b.classList.toggle('active', i === idx);
        });
    };
    knobUpdaters['slice_dir'] = function(norm) {
        var idx = Math.round(norm * 3);
        var container = document.getElementById('slice-dir-btns');
        if (container) container.querySelectorAll('.dir-btn').forEach(function(b, i) {
            b.classList.toggle('active', i === idx);
        });
    };

    // ================================================================
    // FILTER TYPE BUTTONS (filter_type: 0=LP, 1=BP, 2=HP)
    // ================================================================

    window.setFilterType = function(idx) {
        document.querySelectorAll('#filter-type-btns .ftype-btn').forEach(function(b, i) {
            b.classList.toggle('active', i === idx);
        });
        if (parameterStates.filter_type)
            try { parameterStates.filter_type.sliderDragStarted();
                  parameterStates.filter_type.setNormalisedValue(idx / 2);
                  parameterStates.filter_type.sliderDragEnded(); } catch(e) {}
    };
    knobUpdaters['filter_type'] = function(norm) {
        var idx = Math.round(norm * 2);
        document.querySelectorAll('#filter-type-btns .ftype-btn').forEach(function(b, i) {
            b.classList.toggle('active', i === idx);
        });
    };

    // ================================================================
    // CONTROL PANEL TAB SWITCHING
    // ================================================================

    window.switchCtrl = function(tab, bodyId) {
        var panel = tab.closest('.ctrl-panel');
        panel.querySelectorAll('.ctrl-tab').forEach(function(t) { t.classList.remove('active'); });
        panel.querySelectorAll('.ctrl-body').forEach(function(b) { b.classList.remove('active'); });
        tab.classList.add('active');
        document.getElementById(bodyId).classList.add('active');
    };

    // ================================================================
    // FILTER SLIDERS
    // ================================================================

    function initFilterSliders() {
        var cutoffSlider = document.getElementById('cutoff-slider');
        var resSlider    = document.getElementById('res-slider');

        cutoffSlider.addEventListener('input', function() {
            var norm = this.value / 100;
            if (parameterStates.filter_cutoff)
                try { parameterStates.filter_cutoff.setNormalisedValue(norm); } catch(e) {}
        });
        cutoffSlider.addEventListener('mousedown', function() {
            if (parameterStates.filter_cutoff)
                try { parameterStates.filter_cutoff.sliderDragStarted(); } catch(e) {}
        });
        cutoffSlider.addEventListener('mouseup', function() {
            if (parameterStates.filter_cutoff)
                try { parameterStates.filter_cutoff.sliderDragEnded(); } catch(e) {}
        });

        resSlider.addEventListener('input', function() {
            var norm = this.value / 100;
            if (parameterStates.filter_res)
                try { parameterStates.filter_res.setNormalisedValue(norm); } catch(e) {}
        });
        resSlider.addEventListener('mousedown', function() {
            if (parameterStates.filter_res)
                try { parameterStates.filter_res.sliderDragStarted(); } catch(e) {}
        });
        resSlider.addEventListener('mouseup', function() {
            if (parameterStates.filter_res)
                try { parameterStates.filter_res.sliderDragEnded(); } catch(e) {}
        });

        knobUpdaters['filter_cutoff'] = function(norm) {
            cutoffSlider.value = Math.round(norm * 100);
        };
        knobUpdaters['filter_res'] = function(norm) {
            resSlider.value = Math.round(norm * 100);
        };
    }

    // ================================================================
    // ENVELOPE ICON DRAG CONTROLS
    // ================================================================

    function updateEnvVisual(svg) {
        var line = svg.querySelector('.env-line');
        if (!line) return;
        var type = svg.dataset.type;
        var raw  = parseFloat(svg.dataset.value);
        var HL = 15, cx = 18, cy = 30;
        var maxA = 50 * Math.PI / 180;
        var f = function(n) { return +n.toFixed(2); };

        if (type === 'attack') {
            var v = Math.max(0, Math.min(1, raw));
            svg.dataset.value = v;
            var theta = v * maxA;
            line.setAttribute('x1', f(cx - HL * Math.sin(theta)));
            line.setAttribute('y1', f(cy + HL * Math.cos(theta)));
            line.setAttribute('x2', f(cx + HL * Math.sin(theta)));
            line.setAttribute('y2', f(cy - HL * Math.cos(theta)));
        } else if (type === 'decay' || type === 'release') {
            var v = Math.max(0, Math.min(1, raw));
            svg.dataset.value = v;
            var theta = v * maxA;
            line.setAttribute('x1', f(cx - HL * Math.sin(theta)));
            line.setAttribute('y1', f(cy - HL * Math.cos(theta)));
            line.setAttribute('x2', f(cx + HL * Math.sin(theta)));
            line.setAttribute('y2', f(cy + HL * Math.cos(theta)));
        } else if (type === 'sustain') {
            var v = Math.max(0, Math.min(1, raw));
            svg.dataset.value = v;
            var y = f(6 + (1 - v) * 48);
            line.setAttribute('x1', cx - HL); line.setAttribute('y1', y);
            line.setAttribute('x2', cx + HL); line.setAttribute('y2', y);
        } else if (type === 'depth') {
            var v = Math.max(-1, Math.min(1, raw));
            svg.dataset.value = v;
            var y = f(cy - v * 24);
            line.setAttribute('x1', cx - HL); line.setAttribute('y1', y);
            line.setAttribute('x2', cx + HL); line.setAttribute('y2', y);
        }
    }

    function initEnvIcons() {
        document.querySelectorAll('.env-icon').forEach(function(svg) {
            updateEnvVisual(svg);
        });

        var drag = null, startY = 0, startVal = 0;

        document.querySelectorAll('.env-icon').forEach(function(svg) {
            svg.addEventListener('mousedown', function(e) {
                drag = svg;
                startY = e.clientY;
                startVal = parseFloat(svg.dataset.value);
                svg.classList.add('dragging');
                e.preventDefault();
                var paramId = svg.dataset.param;
                if (paramId && parameterStates[paramId])
                    try { parameterStates[paramId].sliderDragStarted(); } catch(err) {}
            });
        });

        document.addEventListener('mousemove', function(e) {
            if (!drag) return;
            var dy = startY - e.clientY;
            var isDepth = (drag.dataset.type === 'depth');
            var sensitivity = isDepth ? 1 / 80 : 1 / 150;
            drag.dataset.value = startVal + dy * sensitivity;
            updateEnvVisual(drag);

            var paramId = drag.dataset.param;
            if (paramId && parameterStates[paramId]) {
                var visVal = parseFloat(drag.dataset.value);
                // Convert visual value → JUCE normalized [0..1]
                var norm = isDepth ? (visVal + 1) / 2 : Math.max(0, Math.min(1, visVal));
                try { parameterStates[paramId].setNormalisedValue(norm); } catch(err) {}
            }
        });

        document.addEventListener('mouseup', function() {
            if (drag) {
                var paramId = drag.dataset.param;
                if (paramId && parameterStates[paramId])
                    try { parameterStates[paramId].sliderDragEnded(); } catch(err) {}
                drag.classList.remove('dragging');
                drag = null;
            }
        });

        // Set up knobUpdaters for each env param → update SVG from JUCE
        var envParams = {
            amp_attack:  { selector: '.env-icon[data-param="amp_attack"]',  isDepth: false },
            amp_decay:   { selector: '.env-icon[data-param="amp_decay"]',   isDepth: false },
            amp_sustain: { selector: '.env-icon[data-param="amp_sustain"]', isDepth: false },
            amp_release: { selector: '.env-icon[data-param="amp_release"]', isDepth: false },
            fenv_depth:  { selector: '.env-icon[data-param="fenv_depth"]',  isDepth: true  },
            fenv_attack: { selector: '.env-icon[data-param="fenv_attack"]', isDepth: false },
            fenv_decay:  { selector: '.env-icon[data-param="fenv_decay"]',  isDepth: false }
        };
        Object.keys(envParams).forEach(function(paramId) {
            var cfg = envParams[paramId];
            knobUpdaters[paramId] = function(norm) {
                var svg = document.querySelector(cfg.selector);
                if (!svg) return;
                // JUCE normalized [0..1] → visual value
                svg.dataset.value = cfg.isDepth ? (norm * 2 - 1) : norm;
                updateEnvVisual(svg);
            };
        });
    }

    // ================================================================
    // GRID CONTROL DRAG
    // ================================================================

    var gridIdx = 2; // default = /4
    var STEPS   = [1, 2, 4, 8, 16];
    var LAYOUT  = {
        1:  { cols: 1, rows: 1 },
        2:  { cols: 1, rows: 2 },
        4:  { cols: 2, rows: 2 },
        8:  { cols: 2, rows: 4 },
        16: { cols: 4, rows: 4 }
    };

    function rebuildSections(val) {
        var layout = LAYOUT[val];
        ['s1','s2','s3','s4'].forEach(function(id) {
            var container = document.getElementById('cells-' + id);
            if (!container) return;
            container.style.gridTemplateColumns = 'repeat(' + layout.cols + ', 1fr)';
            container.style.gridTemplateRows    = 'repeat(' + layout.rows + ', 1fr)';
            var prev = Array.from(container.children).map(function(c) {
                return c.classList.contains('on') || c.classList.contains('lit');
            });
            container.innerHTML = '';
            for (var i = 0; i < val; i++) {
                var cell = document.createElement('div');
                cell.className = (i === 0) ? 'cell on lit' : ((prev[i] !== undefined ? prev[i] : true) ? 'cell on' : 'cell off');
                container.appendChild(cell);
            }
        });
    }

    function initGridDrag() {
        var display = document.getElementById('grid-display');
        if (!display) return;
        var drag = false, startY = 0, startIdx = 0;

        display.addEventListener('mousedown', function(e) {
            drag = true; startY = e.clientY; startIdx = gridIdx;
            e.preventDefault();
            if (parameterStates.grid)
                try { parameterStates.grid.sliderDragStarted(); } catch(err) {}
        });
        document.addEventListener('mousemove', function(e) {
            if (!drag) return;
            var newIdx = Math.max(0, Math.min(4, Math.round(startIdx + (startY - e.clientY) / 20)));
            if (newIdx !== gridIdx) {
                gridIdx = newIdx;
                display.textContent = '/' + STEPS[gridIdx];
                rebuildSections(STEPS[gridIdx]);
                if (parameterStates.grid)
                    try { parameterStates.grid.setNormalisedValue(gridIdx / 4); } catch(err) {}
            }
        });
        document.addEventListener('mouseup', function() {
            if (drag) {
                drag = false;
                if (parameterStates.grid)
                    try { parameterStates.grid.sliderDragEnded(); } catch(err) {}
            }
        });

        knobUpdaters['grid'] = function(norm) {
            var newIdx = Math.round(norm * 4);
            if (newIdx !== gridIdx) {
                gridIdx = newIdx;
                display.textContent = '/' + STEPS[gridIdx];
                rebuildSections(STEPS[gridIdx]);
            }
        };
    }

    // ================================================================
    // SLICE CELL TOGGLE
    // ================================================================

    function initSliceCells() {
        ['s1','s2','s3','s4'].forEach(function(id) {
            var container = document.getElementById('cells-' + id);
            if (!container) return;
            container.addEventListener('click', function(e) {
                var cell = e.target.closest('.cell');
                if (!cell) return;
                if (cell.classList.contains('on')) {
                    cell.classList.replace('on', 'off');
                } else {
                    cell.classList.replace('off', 'on');
                }
            });
        });
        // Also handle dynamically rebuilt cells (delegated from section-block)
        document.querySelectorAll('.section-block').forEach(function(block) {
            block.addEventListener('click', function(e) {
                var cell = e.target.closest('.cell');
                if (!cell) return;
                if (cell.classList.contains('on')) cell.classList.replace('on','off');
                else cell.classList.replace('off','on');
            });
        });
    }

    // ================================================================
    // SEQ LANE CELLS
    // ================================================================

    var laneData = {
        pos:   [0.9,0.4,0.7,0.2,0.6,0.9,0.3,0.8,0.5,0.1,0.7,0.4,0.9,0.3,0.6,0.2],
        vel:   [0.8,0.5,0.9,0.3,0.7,0.4,0.6,0.9,0.2,0.8,0.5,0.3,0.7,0.1,0.6,0.4],
        pitch: [0.5,0.8,0.3,0.7,0.4,0.9,0.2,0.6,0.1,0.5,0.8,0.3,0.7,0.9,0.4,0.6],
        dir:   [0.9,0.9,0.1,0.9,0.1,0.9,0.9,0.1,0.9,0.9,0.1,0.9,0.1,0.9,0.9,0.1]
    };
    var litStep = { pos: 2, vel: 7, pitch: 11, dir: 4 };

    function rebuildLane(id, steps) {
        var container = document.getElementById('lane-' + id);
        if (!container) return;
        container.innerHTML = '';
        var vals = laneData[id];
        var lit  = litStep[id] % steps;
        for (var i = 0; i < 16; i++) {
            var cell = document.createElement('div');
            var v = vals[i];
            cell.dataset.value = v;
            if (i >= steps) {
                cell.className = 'lcell inactive';
            } else if (i === lit) {
                cell.className = 'lcell lit';
            } else {
                cell.className = 'lcell';
                cell.style.background = 'hsl(0,0%,' + Math.round(14 + v * 66) + '%)';
            }
            container.appendChild(cell);
        }
    }

    function initSeqLanes() {
        document.querySelectorAll('.step-val').forEach(function(el) {
            var lane = el.dataset.lane;
            rebuildLane(lane, parseInt(el.dataset.steps));
        });
    }

    window.genRandomize = function() {
        ['pos','vel','pitch','dir'].forEach(function(id) {
            laneData[id] = Array.from({length:16}, function() { return Math.random(); });
            var stepEl = document.querySelector('.step-val[data-lane="' + id + '"]');
            var steps = stepEl ? parseInt(stepEl.dataset.steps) : 16;
            rebuildLane(id, steps);
        });
    };

    window.genReset = function() {
        laneData.pos   = [0.9,0.4,0.7,0.2,0.6,0.9,0.3,0.8,0.5,0.1,0.7,0.4,0.9,0.3,0.6,0.2];
        laneData.vel   = [0.8,0.5,0.9,0.3,0.7,0.4,0.6,0.9,0.2,0.8,0.5,0.3,0.7,0.1,0.6,0.4];
        laneData.pitch = [0.5,0.8,0.3,0.7,0.4,0.9,0.2,0.6,0.1,0.5,0.8,0.3,0.7,0.9,0.4,0.6];
        laneData.dir   = [0.9,0.9,0.1,0.9,0.1,0.9,0.9,0.1,0.9,0.9,0.1,0.9,0.1,0.9,0.9,0.1];
        initSeqLanes();
    };

    // SEQ cell + steps + speed drag
    (function() {
        var cellDrag = null, stepDrag = null, speedDrag = null;
        var startY = 0, startVal = 0;

        document.addEventListener('mousedown', function(e) {
            var sv = e.target.closest('.step-val');
            if (sv) { stepDrag = sv; startY = e.clientY; startVal = parseInt(sv.dataset.steps); e.preventDefault(); return; }
            var spv = e.target.closest('.speed-val');
            if (spv) { speedDrag = spv; startY = e.clientY; startVal = parseInt(spv.dataset.speed); e.preventDefault(); return; }
            var cell = e.target.closest('.lcell:not(.inactive)');
            if (!cell || cell.classList.contains('lit')) return;
            cellDrag = cell; startY = e.clientY;
            startVal = parseFloat(cell.dataset.value || '0.5');
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (stepDrag) {
                var n = Math.max(1, Math.min(16, Math.round(startVal + (startY - e.clientY) / 8)));
                if (n !== parseInt(stepDrag.dataset.steps)) {
                    stepDrag.dataset.steps = n;
                    stepDrag.textContent = n;
                    rebuildLane(stepDrag.dataset.lane, n);
                }
                return;
            }
            if (speedDrag) {
                var n = Math.max(1, Math.min(16, Math.round(startVal + (startY - e.clientY) / 8)));
                if (n !== parseInt(speedDrag.dataset.speed)) {
                    speedDrag.dataset.speed = n;
                    speedDrag.textContent = '*' + n;
                }
                return;
            }
            if (!cellDrag) return;
            var v = Math.max(0, Math.min(1, startVal + (startY - e.clientY) / 100));
            cellDrag.dataset.value = v;
            cellDrag.style.background = 'hsl(0,0%,' + Math.round(14 + v * 66) + '%)';
        });

        document.addEventListener('mouseup', function() {
            cellDrag = null; stepDrag = null; speedDrag = null;
        });
    })();

    // ================================================================
    // PARAMETER STATE INITIALIZATION (connects UI to JUCE)
    // ================================================================

    function initializeParameterStates() {
        for (var paramName in parameterStates) {
            try {
                parameterStates[paramName] = TOGGLE_PARAMS[paramName]
                    ? window.Juce.getToggleState(paramName)
                    : window.Juce.getSliderState(paramName);

                if (knobUpdaters[paramName] && parameterStates[paramName]) {
                    (function(pName) {
                        var state   = parameterStates[pName];
                        var updater = knobUpdaters[pName];
                        var isToggle = !!TOGGLE_PARAMS[pName];
                        state.addValueChangedListener(function() {
                            updater(isToggle ? (state.getValue() ? 1 : 0) : state.getNormalisedValue(), true);
                        });
                    })(paramName);
                }
            } catch(error) {
                // Param not available in context — ok in preview mode
            }
        }
    }

    // ================================================================
    // DOMContentLoaded — wire everything up
    // ================================================================

    document.addEventListener('DOMContentLoaded', function() {
        // Collect mode buttons
        modeBtns = [
            document.getElementById('mode-poly'),
            document.getElementById('mode-slice'),
            document.getElementById('mode-arp')
        ].filter(Boolean);

        // Initialize UI controls
        initFilterSliders();
        initEnvIcons();
        initGridDrag();
        initSliceCells();
        initSeqLanes();

        // Initial grid build
        rebuildSections(STEPS[gridIdx]);

        // Connect JUCE parameter states
        if (juceAvailable) initializeParameterStates();

        // Debug indicator
        var dbg = document.getElementById('debug-status');
        if (dbg) {
            dbg.style.color = juceAvailable ? '#444' : 'var(--text-3)';
            dbg.textContent  = juceAvailable ? 'JUCE' : 'PRV';
        }
    });

})();
</script>
</body>
</html>
