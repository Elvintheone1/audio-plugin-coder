<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gazelle v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none}
body{width:1000px;height:500px;overflow:hidden;background:#0E0E0E;font-family:'Courier New',Courier,monospace}
#ui{position:relative;width:1000px;height:500px}

/* ── ARTWORK ── */
#artwork{position:absolute;top:0;left:0;width:1000px;height:500px;pointer-events:none}

/* ── DIVIDERS ── */
.div-line{position:absolute;top:10px;width:1px;height:480px;background:linear-gradient(to bottom,transparent,#C4960A55 15%,#C4960A99 50%,#C4960A55 85%,transparent)}

/* ── LABELS ── */
#title{position:absolute;top:11px;left:14px;font-size:16px;letter-spacing:6px;color:#C4960A;font-weight:bold;pointer-events:none}
.sec-label{position:absolute;font-size:9px;letter-spacing:3px;color:#C4960Aaa;text-transform:uppercase;pointer-events:none}

/* ── NEVE PUCK ── */
.ctrl{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:ns-resize}
.ctrl svg{display:block;flex-shrink:0}
.ctrl .lbl{margin-top:4px;font-size:8px;letter-spacing:2px;color:#C4960A;text-transform:uppercase;text-align:center;pointer-events:none}
.ctrl .val{font-size:7px;color:#C4960Aaa;text-align:center;margin-top:1px;min-width:38px;pointer-events:none}

/* ── MX TRIGGER ── */
.mx-wrap{display:flex;flex-direction:column;align-items:center}
.mx-btn{width:50px;height:50px;background:linear-gradient(150deg,#F2EAD0,#E0D4A8 40%,#C8BC88);border-radius:3px;cursor:pointer;position:relative;transition:transform 80ms,box-shadow 80ms;box-shadow:inset 0 1px 2px rgba(255,255,255,0.4),0 5px 0 #6A5A30,0 7px 10px rgba(0,0,0,0.7)}
.mx-btn:active,.mx-btn.pressed{transform:translateY(4px);box-shadow:inset 0 1px 2px rgba(255,255,255,0.2),0 1px 0 #6A5A30,0 2px 4px rgba(0,0,0,0.5)}
.mx-led{position:absolute;width:8px;height:8px;border-radius:50%;bottom:7px;right:7px;transition:background 80ms,box-shadow 80ms}
.mx-led.r-off{background:#3A0808}
.mx-led.r-on{background:#FF3A1A;box-shadow:0 0 7px #FF3A1A,0 0 14px #FF3A1A88}
.mx-led.b-off{background:#081830}
.mx-led.b-on{background:#2080FF;box-shadow:0 0 7px #2080FF,0 0 14px #2080FF88}
.mx-lbl{margin-top:5px;font-size:10px;color:#C4960A;letter-spacing:1px}

/* ── FX SELECTOR ── */
#fx-sel{position:absolute;display:flex;gap:2px}
.fx-btn{padding:5px 9px;background:#0C1828;border:1px solid #1848A033;color:#1848A0;font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all 120ms}
.fx-btn:hover{border-color:#1848A077;color:#4070C0}
.fx-btn.active{background:#103060;border-color:#1848A0;color:#C4C4FF;box-shadow:0 0 8px rgba(24,72,160,0.5),inset 0 0 4px rgba(24,72,160,0.3)}

/* ── FB PATH TOGGLE ── */
#fb-wrap{position:absolute;display:flex;flex-direction:column;align-items:center}
.toggle{width:44px;height:22px;background:#1A0808;border:1px solid #C4960A44;border-radius:11px;cursor:pointer;position:relative;transition:background 200ms,border-color 200ms}
.toggle.on{background:#0A0C18;border-color:#C4960A88}
.thumb{position:absolute;width:16px;height:16px;border-radius:50%;top:2px;left:3px;transition:left 200ms,background 200ms,box-shadow 200ms;background:#B81212;box-shadow:0 0 4px rgba(184,18,18,0.5)}
.toggle.on .thumb{left:23px;background:#1848A0;box-shadow:0 0 4px rgba(24,72,160,0.5)}
.toggle-lbl{margin-top:4px;font-size:7px;letter-spacing:2px;color:#C4960A;text-align:center}
.toggle-sub{font-size:6px;color:#C4960A66;letter-spacing:1px;margin-top:1px}

/* ── TRIGGER CLUSTER ── */
/* Both clusters use the same angle — parallel, staggered vertically */
.trigger-cluster{position:absolute;display:flex;flex-direction:column;align-items:center;gap:12px;width:64px}

/* ── ODYSSEY SLIDER ── */
.sliders-row{display:flex;gap:18px;align-items:flex-start}
.ody-slider{display:flex;flex-direction:column;align-items:center;cursor:ns-resize}
.ody-track{width:8px;height:88px;background:#121212;border:1px solid #C4960A33;border-radius:4px;position:relative;overflow:visible}
.ody-thumb{position:absolute;left:-5px;width:18px;height:8px;background:linear-gradient(to bottom,#E0D2A4,#B89040);border-radius:2px;cursor:ns-resize;box-shadow:0 1px 5px rgba(0,0,0,0.85),0 0 3px #C4960A33;top:40px}
.ody-track:hover .ody-thumb{box-shadow:0 1px 5px rgba(0,0,0,0.85),0 0 5px #C4960A66}
.ody-lbl{font-size:7px;letter-spacing:2px;color:#C4960A88;text-transform:uppercase;margin-top:5px;text-align:center}

/* ── VORONOI / MAKER'S MARK ── */
#vor{position:absolute;pointer-events:none;opacity:0.10}
#mark{position:absolute;border:1px solid #C4960A55;padding:3px 6px;font-size:6px;letter-spacing:2px;color:#C4960A55;text-align:center;line-height:1.7;pointer-events:none}
</style>

<script>
// ════════════════════════════════════════════════════════
// NEVE PUCK RENDERER
// ════════════════════════════════════════════════════════

function shade(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, Math.max(0, (n >> 16) + amt));
  const g = Math.min(255, Math.max(0, ((n >> 8) & 0xFF) + amt));
  const b = Math.min(255, Math.max(0, (n & 0xFF) + amt));
  return `rgb(${r},${g},${b})`;
}

function renderPuck(svg, color, norm) {
  const sz  = parseInt(svg.getAttribute('width'));
  const cx  = sz / 2, cy = sz / 2;
  const oR  = sz / 2 - 1;
  const wR  = oR - 4;
  const fR  = oR - 8;
  const iR  = fR - 5;
  const ang = (-135 + norm * 270) * Math.PI / 180;
  const dx  = cx + iR * Math.sin(ang);
  const dy  = cy - iR * Math.cos(ang);
  const uid = color.replace('#', '') + sz;
  svg.innerHTML = `
    <defs>
      <radialGradient id="rg${uid}" cx="38%" cy="32%" r="65%">
        <stop offset="0%" stop-color="${shade(color, 45)}" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="${color}"/>
      </radialGradient>
      <filter id="sh${sz}">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.75"/>
      </filter>
    </defs>
    <circle cx="${cx}" cy="${cy}" r="${oR}" fill="#070707" filter="url(#sh${sz})"/>
    <circle cx="${cx}" cy="${cy}" r="${wR}" fill="${shade(color, -55)}"/>
    <circle cx="${cx}" cy="${cy}" r="${fR}" fill="url(#rg${uid})"/>
    <circle cx="${dx}" cy="${dy}" r="2.5" fill="#C4960A" opacity="0.9"/>
    <circle cx="${dx}" cy="${dy}" r="1.4" fill="#FFE090"/>`;
}

// ════════════════════════════════════════════════════════
// KNOB PARAMETER ENGINE
// ════════════════════════════════════════════════════════

function getNorm(el) {
  const mn = +el.dataset.min, mx = +el.dataset.max, v = +el.dataset.v;
  return (v - mn) / (mx - mn);
}

function fmtVal(p, v) {
  if (p === 'cutoff')                       return v >= 1000 ? (v/1000).toFixed(1)+'kHz' : Math.round(v)+'Hz';
  if (p === 'attack1' || p === 'attack2')   return v < 10 ? v.toFixed(1)+'ms' : Math.round(v)+'ms';
  if (p === 'decay1'  || p === 'decay2')    return v >= 1000 ? (v/1000).toFixed(1)+'s' : Math.round(v)+'ms';
  if (p === 'filter_mode')                  return v < 0.25 ? 'LP' : v > 0.75 ? 'HP' : 'BP';
  return v.toFixed(2);
}

function applyNorm(el, norm) {
  norm = Math.max(0, Math.min(1, norm));
  const mn = +el.dataset.min, mx = +el.dataset.max;
  const v  = mn + norm * (mx - mn);
  el.dataset.v = v;
  renderPuck(el.querySelector('svg'), el.dataset.col, norm);
  el.querySelector('.val').textContent = fmtVal(el.dataset.p, v);
  juceSet(el.dataset.p, v);
}

let drag = null, dragY0 = 0, dragN0 = 0;

document.querySelectorAll('.ctrl').forEach(el => {
  renderPuck(el.querySelector('svg'), el.dataset.col, getNorm(el));
  el.addEventListener('mousedown', e => {
    drag = el; dragY0 = e.clientY; dragN0 = getNorm(el);
    e.preventDefault();
  });
  el.addEventListener('dblclick', () => {
    const mn = +el.dataset.min, mx = +el.dataset.max, df = +el.dataset.def;
    applyNorm(el, (df - mn) / (mx - mn));
  });
});

// ════════════════════════════════════════════════════════
// ODYSSEY SLIDER ENGINE
// ════════════════════════════════════════════════════════

const SLIDER_TRAVEL = 80; // track 88px − thumb 8px

function getSliderNorm(sl) {
  const mn = +sl.dataset.min, mx = +sl.dataset.max, v = +sl.dataset.v;
  return (v - mn) / (mx - mn);
}

function applySliderNorm(sl, norm) {
  norm = Math.max(0, Math.min(1, norm));
  const mn = +sl.dataset.min, mx = +sl.dataset.max;
  sl.dataset.v = mn + norm * (mx - mn);
  sl.querySelector('.ody-thumb').style.top = ((1 - norm) * SLIDER_TRAVEL) + 'px';
  juceSet(sl.dataset.p, +sl.dataset.v);
}

let slDrag = null, slY0 = 0, slN0 = 0;

document.querySelectorAll('.ody-slider').forEach(sl => {
  applySliderNorm(sl, getSliderNorm(sl));
  sl.addEventListener('mousedown', e => {
    slDrag = sl; slY0 = e.clientY; slN0 = getSliderNorm(sl);
    e.preventDefault(); e.stopPropagation();
  });
  sl.addEventListener('dblclick', e => {
    const mn = +sl.dataset.min, mx = +sl.dataset.max, df = +sl.dataset.def;
    applySliderNorm(sl, (df - mn) / (mx - mn));
    e.stopPropagation();
  });
});

// ════════════════════════════════════════════════════════
// UNIFIED INPUT
// ════════════════════════════════════════════════════════

document.addEventListener('mousemove', e => {
  if (drag) {
    const dy = dragY0 - e.clientY;
    applyNorm(drag, dragN0 + dy * (e.shiftKey ? 0.002 : 0.007));
  }
  if (slDrag) {
    applySliderNorm(slDrag, slN0 + (slY0 - e.clientY) / SLIDER_TRAVEL);
  }
});
document.addEventListener('mouseup', () => { drag = null; slDrag = null; });

// ════════════════════════════════════════════════════════
// MX TRIGGER BUTTONS
// ════════════════════════════════════════════════════════

function setupMX(btnId, ledId, offCls, onCls, filter) {
  const btn = document.getElementById(btnId);
  const led = document.getElementById(ledId);
  btn.addEventListener('mousedown', () => {
    btn.classList.add('pressed');
    led.className = `mx-led ${onCls}`;
    juceEvent('triggerPing', { filter });
  });
  document.addEventListener('mouseup', () => {
    btn.classList.remove('pressed');
    setTimeout(() => { led.className = `mx-led ${offCls}`; }, 130);
  });
}
setupMX('mx1', 'led1', 'r-off', 'r-on', 1);
setupMX('mx2', 'led2', 'b-off', 'b-on', 2);

// ════════════════════════════════════════════════════════
// FX TYPE SELECTOR
// ════════════════════════════════════════════════════════

const fxLabels = [['Time','Fdbk'],['Freq','Depth'],['Pre-D','Decay']];
document.querySelectorAll('.fx-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fx-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const t = parseInt(btn.dataset.t);
    document.getElementById('p1-lbl').textContent = fxLabels[t][0];
    document.getElementById('p2-lbl').textContent = fxLabels[t][1];
    juceSet('fx_type', t);
  });
});

// ════════════════════════════════════════════════════════
// FEEDBACK PATH TOGGLE
// ════════════════════════════════════════════════════════

const fbToggle = document.getElementById('fb-toggle');
const fbSub    = document.getElementById('fb-sub');
let   fbOn     = false;
fbToggle.addEventListener('click', () => {
  fbOn = !fbOn;
  fbToggle.classList.toggle('on', fbOn);
  fbSub.textContent = fbOn ? 'THRU FX' : 'DIRECT';
  juceSet('feedback_path', fbOn ? 1 : 0);
});

// ════════════════════════════════════════════════════════
// JUCE BRIDGE
// ════════════════════════════════════════════════════════

function juceSet(id, value) {
  if (window.__JUCE__) window.__JUCE__.backend.emitEvent('paramChange', { id, value });
}
function juceEvent(name, data) {
  if (window.__JUCE__) window.__JUCE__.backend.emitEvent(name, data);
}
if (window.__JUCE__) {
  window.__JUCE__.backend.addEventListener('parameterChanged', e => {
    const { id, value } = e.detail;
    const el = document.querySelector(`[data-p="${id}"]`);
    if (!el) return;
    const mn = +el.dataset.min, mx = +el.dataset.max;
    if (el.classList.contains('ody-slider')) applySliderNorm(el, (value-mn)/(mx-mn));
    else if (el.classList.contains('ctrl'))  applyNorm(el, (value-mn)/(mx-mn));
  });
}
</script>
