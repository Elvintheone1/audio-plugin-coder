<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
body{width:1000px;height:500px;overflow:hidden;background:#0E0E0E;font-family:'Courier New',Courier,monospace}
#ui{position:relative;width:1000px;height:500px}

/* ── ARTWORK ── */
#artwork{position:absolute;top:0;left:0;width:1000px;height:500px;pointer-events:none}

/* ── LABELS ── */
#title{position:absolute;top:11px;left:14px;font-size:16px;letter-spacing:6px;color:#C4960A;font-weight:bold;pointer-events:none}
.sec-label{position:absolute;font-size:9px;letter-spacing:3px;color:#C4960Aaa;text-transform:uppercase;pointer-events:none}

/* ── NEVE PUCK ── */
.ctrl{position:absolute;display:flex;flex-direction:column;align-items:center;cursor:ns-resize}
.ctrl svg{display:block;flex-shrink:0}
.ctrl .lbl{margin-top:4px;font-size:8px;letter-spacing:2px;color:#C4960A;text-transform:uppercase;text-align:center;pointer-events:none}
.ctrl .val{font-size:7px;color:#C4960Aaa;text-align:center;margin-top:1px;min-width:38px;pointer-events:none}

/* ── MX TRIGGER ── */
.mx-wrap{display:flex;flex-direction:column;align-items:center}
.mx-btn{width:50px;height:50px;background:linear-gradient(150deg,#F2EAD0,#E0D4A8 40%,#C8BC88);border-radius:3px;cursor:pointer;position:relative;transition:transform 80ms,box-shadow 80ms;box-shadow:inset 0 1px 2px rgba(255,255,255,0.4),0 5px 0 #6A5A30,0 7px 10px rgba(0,0,0,0.7)}
.mx-btn:active,.mx-btn.pressed{transform:translateY(4px);box-shadow:inset 0 1px 2px rgba(255,255,255,0.2),0 1px 0 #6A5A30,0 2px 4px rgba(0,0,0,0.5)}
.mx-led{position:absolute;width:8px;height:8px;border-radius:50%;bottom:7px;right:7px;transition:background 80ms,box-shadow 80ms}
.mx-led.r-off{background:#3A0808}
.mx-led.r-on{background:#FF3A1A;box-shadow:0 0 7px #FF3A1A,0 0 14px #FF3A1A88}
.mx-led.b-off{background:#081830}
.mx-led.b-on{background:#2080FF;box-shadow:0 0 7px #2080FF,0 0 14px #2080FF88}
.mx-lbl{margin-top:5px;font-size:10px;color:#C4960A;letter-spacing:1px}




/* ── TRIGGER CLUSTER ── */
.trigger-cluster{position:absolute;display:flex;flex-direction:column;align-items:center;gap:12px;width:64px}

/* ── ODYSSEY SLIDER ── */
.sliders-row{display:flex;gap:18px;align-items:flex-start}
.ody-slider{display:flex;flex-direction:column;align-items:center;cursor:ns-resize}
.ody-track{width:8px;height:88px;background:#121212;border:1px solid #C4960A33;border-radius:4px;position:relative;overflow:visible}
.ody-thumb{position:absolute;left:-5px;width:18px;height:8px;background:linear-gradient(to bottom,#E0D2A4,#B89040);border-radius:2px;cursor:ns-resize;box-shadow:0 1px 5px rgba(0,0,0,0.85),0 0 3px #C4960A33;top:40px}
.ody-track:hover .ody-thumb{box-shadow:0 1px 5px rgba(0,0,0,0.85),0 0 5px #C4960A66}
.ody-lbl{font-size:7px;letter-spacing:2px;color:#C4960A88;text-transform:uppercase;margin-top:5px;text-align:center}

/* ── VORONOI / MAKER'S MARK ── */
#vor{position:absolute;pointer-events:none;opacity:0.10}
#mark{position:absolute;border:1px solid #C4960A55;padding:3px 6px;font-size:6px;letter-spacing:2px;color:#C4960A55;text-align:center;line-height:1.7;pointer-events:none}
</style>

<script>
// ════════════════════════════════════════════════════════
// JUCE FRONTEND LIBRARY (inlined)
// Provides SliderState and ToggleState bridging to C++
// ════════════════════════════════════════════════════════

var juceAvailable = typeof window.__JUCE__ !== 'undefined';

function SliderState(name) {
    this.name = name;
    this.identifier = '__juce__slider' + name;
    this.scaledValue = 0;
    this.properties = { start: 0, end: 1, skew: 1, name: '', label: '', numSteps: 100, interval: 0, parameterIndex: -1 };
    this.valueChangedListeners = [];
    var self = this;
    if (juceAvailable && window.__JUCE__.backend) {
        window.__JUCE__.backend.addEventListener(this.identifier, function(e) { self.handleEvent(e); });
        window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'requestInitialUpdate' });
    }
}
SliderState.prototype.normalisedToScaledValue = function(v) {
    var p = this.properties;
    if (p.skew !== 1.0) v = Math.pow(v, 1.0 / p.skew);
    return p.start + v * (p.end - p.start);
};
SliderState.prototype.scaledToNormalisedValue = function(v) {
    var p = this.properties;
    var n = (p.end !== p.start) ? (v - p.start) / (p.end - p.start) : 0;
    if (p.skew !== 1.0) n = Math.pow(Math.max(0, n), p.skew);
    return Math.max(0, Math.min(1, n));
};
SliderState.prototype.snapToLegalValue = function(v) {
    var p = this.properties;
    if (p.interval > 0) v = p.start + Math.round((v - p.start) / p.interval) * p.interval;
    return Math.max(p.start, Math.min(p.end, v));
};
SliderState.prototype.setNormalisedValue = function(v) {
    this.scaledValue = this.snapToLegalValue(this.normalisedToScaledValue(v));
    if (juceAvailable && window.__JUCE__.backend)
        window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'valueChanged', value: this.scaledValue });
};
SliderState.prototype.sliderDragStarted = function() {
    if (juceAvailable && window.__JUCE__.backend)
        window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'sliderDragStarted' });
};
SliderState.prototype.sliderDragEnded = function() {
    if (juceAvailable && window.__JUCE__.backend)
        window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'sliderDragEnded' });
};
SliderState.prototype.handleEvent = function(event) {
    if (event.eventType === 'valueChanged') {
        this.scaledValue = event.value;
        this.valueChangedListeners.forEach(function(fn) { try { fn(); } catch(e) {} });
    } else if (event.eventType === 'propertiesChanged') {
        var props = {};
        for (var k in event) { if (k !== 'eventType') props[k] = event[k]; }
        this.properties = props;
    }
};
SliderState.prototype.getNormalisedValue = function() {
    return this.scaledToNormalisedValue(this.scaledValue);
};
SliderState.prototype.addValueChangedListener = function(fn) { this.valueChangedListeners.push(fn); };

function ToggleState(name) {
    this.name = name;
    this.identifier = '__juce__toggle' + name;
    this.value = false;
    this.valueChangedListeners = [];
    var self = this;
    if (juceAvailable && window.__JUCE__.backend) {
        window.__JUCE__.backend.addEventListener(this.identifier, function(e) { self.handleEvent(e); });
        window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'requestInitialUpdate' });
    }
}
ToggleState.prototype.getValue  = function() { return this.value; };
ToggleState.prototype.setValue  = function(v) {
    this.value = v;
    if (juceAvailable && window.__JUCE__.backend)
        window.__JUCE__.backend.emitEvent(this.identifier, { eventType: 'valueChanged', value: this.value });
};
ToggleState.prototype.handleEvent = function(event) {
    if (event.eventType === 'valueChanged') {
        this.value = event.value;
        this.valueChangedListeners.forEach(function(fn) { try { fn(); } catch(e) {} });
    }
};
ToggleState.prototype.addValueChangedListener = function(fn) { this.valueChangedListeners.push(fn); };

var sliderStates = {}, toggleStates = {};
window.Juce = window.Juce || {};
window.Juce.getSliderState = function(name) {
    if (!sliderStates[name]) sliderStates[name] = new SliderState(name);
    return sliderStates[name];
};
window.Juce.getToggleState = function(name) {
    if (!toggleStates[name]) toggleStates[name] = new ToggleState(name);
    return toggleStates[name];
};

// ════════════════════════════════════════════════════════
// NEVE PUCK RENDERER
// ════════════════════════════════════════════════════════

function shade(hex, amt) {
    var n = parseInt(hex.slice(1), 16);
    var r = Math.min(255, Math.max(0, (n >> 16) + amt));
    var g = Math.min(255, Math.max(0, ((n >> 8) & 0xFF) + amt));
    var b = Math.min(255, Math.max(0, (n & 0xFF) + amt));
    return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function renderPuck(svg, color, norm) {
    var sz  = parseInt(svg.getAttribute('width'));
    var cx  = sz / 2, cy = sz / 2;
    var oR  = sz / 2 - 1;
    var wR  = oR - 4;
    var fR  = oR - 8;
    var iR  = fR - 5;
    var ang = (-135 + norm * 270) * Math.PI / 180;
    var dx  = cx + iR * Math.sin(ang);
    var dy  = cy - iR * Math.cos(ang);
    var uid = color.replace('#', '') + sz;
    svg.innerHTML =
        '<defs>' +
        '<radialGradient id="rg' + uid + '" cx="38%" cy="32%" r="65%">' +
        '<stop offset="0%" stop-color="' + shade(color, 45) + '" stop-opacity="0.7"/>' +
        '<stop offset="100%" stop-color="' + color + '"/>' +
        '</radialGradient>' +
        '<filter id="sh' + sz + '">' +
        '<feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.75"/>' +
        '</filter></defs>' +
        '<circle cx="' + cx + '" cy="' + cy + '" r="' + oR + '" fill="#070707" filter="url(#sh' + sz + ')"/>' +
        '<circle cx="' + cx + '" cy="' + cy + '" r="' + wR + '" fill="' + shade(color, -55) + '"/>' +
        '<circle cx="' + cx + '" cy="' + cy + '" r="' + fR + '" fill="url(#rg' + uid + ')"/>' +
        '<circle cx="' + dx + '" cy="' + dy + '" r="2.5" fill="#C4960A" opacity="0.9"/>' +
        '<circle cx="' + dx + '" cy="' + dy + '" r="1.4" fill="#FFE090"/>';
}

// ════════════════════════════════════════════════════════
// KNOB PARAMETER ENGINE
// ════════════════════════════════════════════════════════

function getNorm(el) {
    var mn = +el.dataset.min, mx = +el.dataset.max, v = +el.dataset.v;
    return (v - mn) / (mx - mn);
}

function fmtVal(p, v) {
    if (p === 'cutoff')                       { var hz = v <= 0.65 ? 20 * Math.pow(20, v / 0.65) : 400 * Math.pow(37.5, (v - 0.65) / 0.35); return hz >= 1000 ? (hz/1000).toFixed(2)+'kHz' : Math.round(hz)+'Hz'; }
    if (p === 'attack1' || p === 'attack2')   return v < 10 ? v.toFixed(1)+'ms' : Math.round(v)+'ms';
    if (p === 'decay1'  || p === 'decay2')    return v >= 1000 ? (v/1000).toFixed(1)+'s' : Math.round(v)+'ms';
    if (p === 'filter1_mode' || p === 'filter2_mode') return v < 0.25 ? 'LP' : v > 0.75 ? 'HP' : 'BP';
    if (p === 'spread')                       return (v * 12).toFixed(1) + 'st';
    if (p === 'pitch1' || p === 'pitch2')     return v.toFixed(1) + 'st';
    if (p === 'eq_bass' || p === 'eq_mid' || p === 'eq_treble') {
        var db = v * 15; return (db >= 0 ? '+' : '') + db.toFixed(1) + 'dB';
    }
    if (p === 'fx_type')        return Math.round(v * 100) + '%';
    if (p === 'fx_p1')          { var ms = 5 + v * 795; return ms >= 1000 ? (ms/1000).toFixed(2)+'s' : Math.round(ms)+'ms'; }
    if (p === 'fx_p2')          return Math.round(v * 100) + '%';
    if (p === 'fx_wet')         return Math.round(v * 100) + '%';
    if (p === 'delay_feedback') return Math.round(v * 80) + '%';
    if (p === 'delay_mix')      return Math.round(v * 100) + '%';
    if (p === 'plate_predelay') return Math.round(v * 80) + 'ms';
    if (p === 'plate_mix')      return Math.round(v * 100) + '%';
    return v.toFixed(2);
}

function applyNorm(el, norm) {
    norm = Math.max(0, Math.min(1, norm));
    var mn = +el.dataset.min, mx = +el.dataset.max;
    var v  = mn + norm * (mx - mn);
    el.dataset.v = v;
    renderPuck(el.querySelector('svg'), el.dataset.col, norm);
    el.querySelector('.val').textContent = fmtVal(el.dataset.p, v);
    // Send to JUCE
    try {
        var state = window.Juce.getSliderState(el.dataset.p);
        if (state) state.setNormalisedValue(norm);
    } catch(e) {}
}

var drag = null, dragY0 = 0, dragN0 = 0;

document.querySelectorAll('.ctrl').forEach(function(el) {
    renderPuck(el.querySelector('svg'), el.dataset.col, getNorm(el));
    el.addEventListener('mousedown', function(e) {
        drag = el; dragY0 = e.clientY; dragN0 = getNorm(el);
        e.preventDefault();
        try { window.Juce.getSliderState(el.dataset.p).sliderDragStarted(); } catch(e) {}
    });
    el.addEventListener('dblclick', function() {
        var mn = +el.dataset.min, mx = +el.dataset.max, df = +el.dataset.def;
        applyNorm(el, (df - mn) / (mx - mn));
    });
    // Listen for host parameter changes (DAW recall / automation)
    try {
        var state = window.Juce.getSliderState(el.dataset.p);
        (function(elem, st) {
            st.addValueChangedListener(function() {
                var norm = st.getNormalisedValue();
                var mn = +elem.dataset.min, mx = +elem.dataset.max;
                var v  = mn + norm * (mx - mn);
                elem.dataset.v = v;
                renderPuck(elem.querySelector('svg'), elem.dataset.col, norm);
                elem.querySelector('.val').textContent = fmtVal(elem.dataset.p, v);
            });
        })(el, state);
    } catch(e) {}
});

// ════════════════════════════════════════════════════════
// ODYSSEY SLIDER ENGINE
// ════════════════════════════════════════════════════════

var SLIDER_TRAVEL = 80;

function getSliderNorm(sl) {
    var mn = +sl.dataset.min, mx = +sl.dataset.max, v = +sl.dataset.v;
    return (v - mn) / (mx - mn);
}

function applySliderNorm(sl, norm) {
    norm = Math.max(0, Math.min(1, norm));
    var mn = +sl.dataset.min, mx = +sl.dataset.max;
    sl.dataset.v = mn + norm * (mx - mn);
    sl.querySelector('.ody-thumb').style.top = ((1 - norm) * SLIDER_TRAVEL) + 'px';
    // Send to JUCE
    try {
        var state = window.Juce.getSliderState(sl.dataset.p);
        if (state) state.setNormalisedValue(norm);
    } catch(e) {}
}

var slDrag = null, slY0 = 0, slN0 = 0;

document.querySelectorAll('.ody-slider').forEach(function(sl) {
    applySliderNorm(sl, getSliderNorm(sl));
    sl.addEventListener('mousedown', function(e) {
        slDrag = sl; slY0 = e.clientY; slN0 = getSliderNorm(sl);
        e.preventDefault(); e.stopPropagation();
        try { window.Juce.getSliderState(sl.dataset.p).sliderDragStarted(); } catch(e) {}
    });
    sl.addEventListener('dblclick', function(e) {
        var mn = +sl.dataset.min, mx = +sl.dataset.max, df = +sl.dataset.def;
        applySliderNorm(sl, (df - mn) / (mx - mn));
        e.stopPropagation();
    });
    // Listen for host parameter changes
    try {
        var state = window.Juce.getSliderState(sl.dataset.p);
        (function(elem, st) {
            st.addValueChangedListener(function() {
                var norm = st.getNormalisedValue();
                var mn = +elem.dataset.min, mx = +elem.dataset.max;
                elem.dataset.v = mn + norm * (mx - mn);
                elem.querySelector('.ody-thumb').style.top = ((1 - norm) * SLIDER_TRAVEL) + 'px';
            });
        })(sl, state);
    } catch(e) {}
});

// ════════════════════════════════════════════════════════
// UNIFIED MOUSE INPUT
// ════════════════════════════════════════════════════════

document.addEventListener('mousemove', function(e) {
    if (drag) {
        var dy = dragY0 - e.clientY;
        applyNorm(drag, dragN0 + dy * (e.shiftKey ? 0.002 : 0.007));
    }
    if (slDrag) {
        applySliderNorm(slDrag, slN0 + (slY0 - e.clientY) / SLIDER_TRAVEL);
    }
});
document.addEventListener('mouseup', function() {
    if (drag) {
        try { window.Juce.getSliderState(drag.dataset.p).sliderDragEnded(); } catch(e) {}
        drag = null;
    }
    if (slDrag) {
        try { window.Juce.getSliderState(slDrag.dataset.p).sliderDragEnded(); } catch(e) {}
        slDrag = null;
    }
});

// ════════════════════════════════════════════════════════
// MX TRIGGER BUTTONS
// ════════════════════════════════════════════════════════

function setupMX(btnId, ledId, offCls, onCls, paramId) {
    var btn   = document.getElementById(btnId);
    var led   = document.getElementById(ledId);
    var state = window.Juce.getToggleState(paramId);

    btn.addEventListener('mousedown', function() {
        btn.classList.add('pressed');
        led.className = 'mx-led ' + onCls;
        try { state.setValue(true); } catch(e) {}
    });
    // Release on global mouseup (handles drag-off)
    document.addEventListener('mouseup', function() {
        btn.classList.remove('pressed');
        setTimeout(function() { led.className = 'mx-led ' + offCls; }, 130);
        try { state.setValue(false); } catch(e) {}
    });
}
setupMX('mx1', 'led1', 'r-off', 'r-on', 'trigger1');
setupMX('mx2', 'led2', 'b-off', 'b-on', 'trigger2');


</script>
