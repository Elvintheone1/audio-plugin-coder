<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beady Eye</title>
    <!-- JS inlined at bottom of body (module imports don't work with WKWebView resource provider) -->
    <style>
        :root {
            --bg:        #9DBFB5;
            --panel-l:   #8FB5AB;
            --panel-m:   #96BAB0;
            --panel-r:   #A3C2B8;
            --divider:   #7EA89E;
            --knob-body: #141E1C;
            --knob-ring: #2C4440;
            --knob-fill: #C8E8E0;
            --atten-col: #8B2A3A;
            --text:      #0C1816;
            --text-dim:  #4A6B62;
            --active:    #00E8D4;
            --font:      'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            width: 640px;
            height: 350px;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ---- PANEL BACKGROUNDS ---- */
        .panel {
            position: absolute;
            top: 36px; bottom: 20px;
            z-index: 0;
            pointer-events: none;
        }
        .panel-l { left: 0;     right: 455px; background: var(--panel-l); }
        .panel-m { left: 185px; right: 272px; background: var(--panel-m); }
        .panel-r { left: 368px; right: 0;     background: var(--panel-r); }

        /* ---- PANEL DIVIDERS ---- */
        .divider {
            position: absolute;
            top: 36px; bottom: 20px;
            width: 2px;
            background: var(--divider);
            opacity: 0.7;
            z-index: 3;
            pointer-events: none;
            transform-origin: top center;
        }

        /* ---- HEADER ---- */
        .header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: #8DB5AB;
            border-bottom: 1px solid var(--divider);
            z-index: 10;
        }
        .header-title { font-size: 11px; font-weight: 700; letter-spacing: 0.4em; text-transform: uppercase; color: var(--text); }
        .header-sub   { font-size: 8px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }
        .header-right  { font-size: 8px; color: var(--text-dim); letter-spacing: 0.12em; }

        /* ---- FOOTER ---- */
        .footer {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: #8DB5AB;
            border-top: 1px solid var(--divider);
            font-size: 8px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            z-index: 10;
        }

        /* ---- KNOB WRAP ---- */
        .knob-wrap, .out-wrap {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        .knob-value {
            font-size: 9px;
            color: var(--text);
            opacity: 0.65;
            font-variant-numeric: tabular-nums;
            min-height: 13px;
            min-width: 44px;
            text-align: center;
        }
        .knob-value.atten-mode { color: var(--atten-col); opacity: 1.0; }
        .knob-svg { cursor: pointer; }

        /* Atten arc — wine red, centered on current value, visible when atten > 0 */
        .knob-atten {
            fill: none;
            stroke: var(--atten-col);
            stroke-width: 3;
            stroke-linecap: round;
            opacity: 0;
            transition: opacity 100ms, stroke-width 80ms;
        }
        .knob-atten.atten-active { stroke-width: 4; }

        /* ---- FREEZE ---- */
        .freeze-wrap {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        .freeze-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid var(--divider);
            background: var(--knob-body);
            cursor: pointer;
            transition: all 120ms ease-out;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dim);
            font-size: 15px;
            font-family: var(--font);
        }
        .freeze-btn.active {
            background: var(--active);
            border-color: var(--active);
            box-shadow: 0 0 16px rgba(0, 232, 212, 0.35);
            color: var(--knob-body);
        }
        .freeze-label { font-size: 8px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }

        /* ---- METERS ---- */
        .meters { position: absolute; display: flex; gap: 3px; flex-direction: column; align-items: center; z-index: 2; }
        .meter-pair { display: flex; gap: 3px; }
        .meter-bar { width: 4px; height: 68px; background: rgba(0,0,0,0.12); border-radius: 2px; position: relative; overflow: hidden; }
        .meter-fill { position: absolute; bottom: 0; width: 100%; border-radius: 2px; transition: height 50ms; background: var(--active); }
        .meter-lbl { font-size: 7px; color: var(--text-dim); letter-spacing: 0.1em; margin-top: 2px; }

        /* ---- SYNC TOGGLE ---- */
        .sync-wrap {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 6px;
            transform: translateX(-50%);
            z-index: 2;
        }
        .sync-btn {
            font-size: 8px; font-weight: 700; font-family: var(--font);
            letter-spacing: 0.1em; padding: 3px 10px;
            border: 1px solid var(--divider); border-radius: 3px;
            background: rgba(0,0,0,0.08); color: var(--text-dim); cursor: pointer; transition: all 100ms;
        }
        .sync-btn.active { background: var(--active); border-color: var(--active); color: var(--knob-body); }
        .sync-division { font-size: 10px; font-weight: 700; font-family: var(--font); color: var(--active); letter-spacing: 0.05em; }

        /* ---- GRAIN SCOPE ---- */
        #grain-scope { position: absolute; z-index: 2; border-radius: 4px; background: rgba(0,0,0,0.06); }

        /* ---- SECTION LABELS ---- */
        .section-lbl {
            position: absolute;
            font-size: 7px; font-weight: 600; letter-spacing: 0.2em;
            text-transform: uppercase; color: var(--text-dim); opacity: 0.5; z-index: 2;
        }
    </style>
</head>
<body>

    <!-- PANEL BACKGROUNDS -->
    <div class="panel panel-l"></div>
    <div class="panel panel-m"></div>
    <div class="panel panel-r"></div>

    <!-- ANGLED DIVIDERS -->
    <div class="divider" style="left:185px; transform:rotate(1.5deg);"></div>
    <div class="divider" style="left:368px; transform:rotate(1.5deg);"></div>

    <!-- HEADER -->
    <div class="header">
        <div class="header-title">BEADY EYE</div>
        <div class="header-sub">Granular Texture Processor</div>
        <div class="header-right">GRAINS: <span id="grain-count">0</span></div>
    </div>

    <!-- GRAIN SCOPE CANVAS -->
    <canvas id="grain-scope" style="left:193px; top:50px;" width="152" height="60"></canvas>

    <!-- Section labels -->
    <span class="section-lbl" style="left:20px; top:42px;">GRAIN</span>
    <span class="section-lbl" style="left:363px; top:42px;">ENGINE</span>

    <!-- ================================================================
         LEFT PANEL (0–220px): TIME / SIZE / SHAPE
         ================================================================ -->

    <!-- TIME (72px) -->
    <div class="knob-wrap" style="left:94px; top:96px;" id="time-control"
         data-param="time" data-min="0" data-max="1" data-default="0.5" data-atten="time_atten">
        <svg class="knob-svg" width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="32" fill="var(--knob-body)"/>
            <circle class="knob-track" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-ring)" stroke-width="8"
                    stroke-dasharray="113.1 999" transform="rotate(135 36 36)"/>
            <circle class="knob-fill" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-fill)" stroke-width="8"
                    stroke-dasharray="0 999" transform="rotate(135 36 36)"/>
            <path class="knob-atten" d=""/>
            <text x="36" y="40" text-anchor="middle" fill="var(--text-dim)"
                  font-size="7" letter-spacing="1"
                  font-family="Helvetica Neue, Helvetica, Arial, sans-serif">TIME</text>
        </svg>
        <span class="knob-value" id="time-value">50%</span>
    </div>

    <!-- SIZE -->
    <div class="knob-wrap" style="left:127px; top:190px;" id="size-control"
         data-param="size" data-min="-1" data-max="1" data-default="0.5" data-bipolar="true" data-atten="size_atten">
        <svg class="knob-svg" width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="32" fill="var(--knob-body)"/>
            <circle class="knob-track" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-ring)" stroke-width="8"
                    stroke-dasharray="150.8 999" transform="rotate(135 36 36)"/>
            <path class="knob-fill" fill="none" stroke="var(--knob-fill)"
                  stroke-width="8" d=""/>
            <line x1="36" y1="8" x2="36" y2="22"
                  stroke="var(--knob-fill)" stroke-width="1.5"/>
            <path class="knob-atten" d=""/>
            <text x="36" y="40" text-anchor="middle" fill="var(--text-dim)"
                  font-size="7" letter-spacing="1"
                  font-family="Helvetica Neue, Helvetica, Arial, sans-serif">SIZE</text>
        </svg>
        <span class="knob-value" id="size-value">0.50</span>
    </div>

    <!-- SHAPE (72px) — lower left -->
    <div class="knob-wrap" style="left:91px; top:276px;" id="shape-control"
         data-param="shape" data-min="0" data-max="1" data-default="0.5" data-atten="shape_atten">
        <svg class="knob-svg" width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="32" fill="var(--knob-body)"/>
            <circle class="knob-track" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-ring)" stroke-width="8"
                    stroke-dasharray="113.1 999" transform="rotate(135 36 36)"/>
            <circle class="knob-fill knob-indicator" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-fill)" stroke-width="8"
                    stroke-dasharray="8.38 999" transform="rotate(125 36 36)"/>
            <path class="knob-atten" d=""/>
            <!-- 4 envelope icons clockwise from min (7-o'clock):
                 RECT=BL  PERC=TL  HANN=TR  PAD=BR -->
            <path d="M 6,65 L 6,59 L 14,59 L 14,65"
                  fill="none" stroke="var(--text-dim)" stroke-width="1.1" stroke-linejoin="miter" opacity="0.5"/>
            <path d="M 6,14 L 6,6 Q 14,6 14,14"
                  fill="none" stroke="var(--text-dim)" stroke-width="1.1" opacity="0.5"/>
            <path d="M 58,14 Q 62,6 66,14"
                  fill="none" stroke="var(--text-dim)" stroke-width="1.1" opacity="0.5"/>
            <path d="M 57,65 Q 65,65 65,59 L 65,65"
                  fill="none" stroke="var(--text-dim)" stroke-width="1.1" opacity="0.5"/>
            <text x="36" y="40" text-anchor="middle" fill="var(--text-dim)"
                  font-size="7" letter-spacing="1"
                  font-family="Helvetica Neue, Helvetica, Arial, sans-serif">SHAPE</text>
        </svg>
        <span class="knob-value" id="shape-value" style="display:none;"></span>
    </div>

    <!-- ================================================================
         MIDDLE PANEL (220–600px): PITCH / FEEDBACK + FREEZE
         ================================================================ -->

    <!-- PITCH (72px) — slightly left of panel center -->
    <div class="knob-wrap" style="left:240px; top:120px;" id="pitch-control"
         data-param="pitch" data-min="-24" data-max="24" data-default="0" data-bipolar="true" data-unit="st" data-atten="pitch_atten">
        <svg class="knob-svg" width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="32" fill="var(--knob-body)"/>
            <circle class="knob-track" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-ring)" stroke-width="8"
                    stroke-dasharray="113.1 999" transform="rotate(135 36 36)"/>
            <path class="knob-fill" fill="none" stroke="var(--knob-fill)"
                  stroke-width="8" d=""/>
            <line x1="36" y1="7" x2="36" y2="19"
                  stroke="var(--knob-fill)" stroke-width="1.5"/>
            <path class="knob-atten" d=""/>
            <text x="36" y="40" text-anchor="middle" fill="var(--text-dim)"
                  font-size="7" letter-spacing="1"
                  font-family="Helvetica Neue, Helvetica, Arial, sans-serif">PITCH</text>
        </svg>
        <span class="knob-value" id="pitch-value">0.0 st</span>
    </div>

    <!-- FEEDBACK (72px) — right of panel, higher than PITCH (asymmetric) -->
    <div class="knob-wrap" style="left:308px; top:198px;" id="feedback-control"
         data-param="feedback" data-min="0" data-max="1" data-default="0">
        <svg class="knob-svg" width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="32" fill="var(--knob-body)"/>
            <circle class="knob-track" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-ring)" stroke-width="8"
                    stroke-dasharray="113.1 999" transform="rotate(135 36 36)"/>
            <circle class="knob-fill" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-fill)" stroke-width="8"
                    stroke-dasharray="0 999" transform="rotate(135 36 36)"/>
            <text x="36" y="40" text-anchor="middle" fill="var(--text-dim)"
                  font-size="7" letter-spacing="1"
                  font-family="Helvetica Neue, Helvetica, Arial, sans-serif">FDBK</text>
        </svg>
        <span class="knob-value" id="feedback-value">0%</span>
    </div>

    <!-- FREEZE -->
    <div class="freeze-wrap" style="left:263px; top:265px;" id="freeze-control">
        <button class="freeze-btn" id="freeze-btn">&#10052;</button>
        <span class="freeze-label">FREEZE</span>
    </div>

    <!-- ================================================================
         RIGHT PANEL (600–1000px): DENSITY hero + SYNC + VU + output row
         ================================================================ -->

    <!-- DENSITY (114px hero - 5% smaller) -->
    <div class="knob-wrap" style="left:466px; top:135px;" id="density-control"
         data-param="density" data-min="-1" data-max="1" data-default="0" data-bipolar="true">
        <svg class="knob-svg" width="114" height="114" viewBox="0 0 114 114">
            <circle cx="57" cy="57" r="55" fill="var(--knob-body)"/>
            <circle class="knob-track" cx="57" cy="57" r="43" fill="none"
                    stroke="var(--knob-ring)" stroke-width="10"
                    stroke-dasharray="202.6 999" transform="rotate(135 57 57)"/>
            <path class="knob-fill" fill="none" stroke="var(--knob-fill)"
                  stroke-width="10" d=""/>
            <line x1="57" y1="8" x2="57" y2="25"
                  stroke="var(--knob-fill)" stroke-width="2"/>
            <text x="57" y="63" text-anchor="middle" fill="var(--text-dim)"
                  font-size="8" letter-spacing="2"
                  font-family="Helvetica Neue, Helvetica, Arial, sans-serif">DENSITY</text>
        </svg>
        <span class="knob-value" id="density-value">0.00</span>
    </div>

    <!-- SYNC toggle (below DENSITY) -->
    <div class="sync-wrap" style="left:466px; top:220px;">
        <button class="sync-btn" id="density-sync-btn">FREE</button>
        <span class="sync-division" id="sync-division" style="display:none;">—</span>
    </div>

    <!-- VU METERS: omitted -->

    <!-- OUTPUT ROW: MIX / REVERB / OUTPUT (72px — from 56px) -->

    <!-- MIX (dry_wet) — left of row, slightly lower -->
    <div class="out-wrap" style="left:410px; top:224px;" id="dry_wet-control"
         data-param="dry_wet" data-min="0" data-max="1" data-default="0.5">
        <svg class="knob-svg" width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="32" fill="var(--knob-body)"/>
            <circle class="knob-track" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-ring)" stroke-width="8"
                    stroke-dasharray="113.1 999" transform="rotate(135 36 36)"/>
            <path class="knob-fill" fill="none" stroke="var(--knob-fill)"
                  stroke-width="8" d=""/>
            <line x1="36" y1="8" x2="36" y2="22"
                  stroke="var(--knob-fill)" stroke-width="1.5"/>
            <text x="36" y="40" text-anchor="middle" fill="var(--text-dim)"
                  font-size="7" letter-spacing="1"
                  font-family="Helvetica Neue, Helvetica, Arial, sans-serif">MIX</text>
        </svg>
        <span class="knob-value" id="dry_wet-value">50%</span>
    </div>

    <!-- REVERB — center, slightly higher (asymmetric) -->
    <div class="out-wrap" style="left:468px; top:278px;" id="reverb-control"
         data-param="reverb" data-min="0" data-max="1" data-default="0">
        <svg class="knob-svg" width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="32" fill="var(--knob-body)"/>
            <circle class="knob-track" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-ring)" stroke-width="8"
                    stroke-dasharray="113.1 999" transform="rotate(135 36 36)"/>
            <circle class="knob-fill" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-fill)" stroke-width="8"
                    stroke-dasharray="0 999" transform="rotate(135 36 36)"/>
            <text x="36" y="40" text-anchor="middle" fill="var(--text-dim)"
                  font-size="7" letter-spacing="1"
                  font-family="Helvetica Neue, Helvetica, Arial, sans-serif">RVB</text>
        </svg>
        <span class="knob-value" id="reverb-value">0%</span>
    </div>

    <!-- OUTPUT — right edge, slightly lower (asymmetric) -->
    <div class="out-wrap" style="left:536px; top:224px;" id="output_vol-control"
         data-param="output_vol" data-min="0" data-max="1" data-default="0.75">
        <svg class="knob-svg" width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="32" fill="var(--knob-body)"/>
            <circle class="knob-track" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-ring)" stroke-width="8"
                    stroke-dasharray="113.1 999" transform="rotate(135 36 36)"/>
            <circle class="knob-fill" cx="36" cy="36" r="24" fill="none"
                    stroke="var(--knob-fill)" stroke-width="8"
                    stroke-dasharray="0 999" transform="rotate(135 36 36)"/>
            <text x="36" y="40" text-anchor="middle" fill="var(--text-dim)"
                  font-size="7" letter-spacing="1"
                  font-family="Helvetica Neue, Helvetica, Arial, sans-serif">OUT</text>
        </svg>
        <span class="knob-value" id="output_vol-value">75%</span>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <span id="debug-status" style="color:var(--text-dim);">INIT...</span>
        <span>BEADY EYE v0.9</span>
    </div>

    <!-- ALL JS INLINED — WKWebView resource provider doesn't support ES module imports -->
    <script>
    (function() {
        'use strict';

        // ================================================================
        // JUCE LIBRARY (INLINED)
        // ================================================================

        var juceAvailable = typeof window.__JUCE__ !== 'undefined';

        function SliderState(name) {
            this.name = name;
            this.identifier = "__juce__slider" + name;
            this.scaledValue = 0;
            this.properties = { start: 0, end: 1, skew: 1, name: "", label: "", numSteps: 100, interval: 0, parameterIndex: -1 };
            this.valueChangedListeners = [];
            var self = this;
            if (juceAvailable && window.__JUCE__.backend) {
                window.__JUCE__.backend.addEventListener(this.identifier, function(e) { self.handleEvent(e); });
                window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "requestInitialUpdate" });
            }
        }
        SliderState.prototype.setNormalisedValue = function(v) {
            this.scaledValue = this.snapToLegalValue(this.normalisedToScaledValue(v));
            if (juceAvailable && window.__JUCE__.backend)
                window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "valueChanged", value: this.scaledValue });
        };
        SliderState.prototype.sliderDragStarted = function() {
            if (juceAvailable && window.__JUCE__.backend)
                window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "sliderDragStarted" });
        };
        SliderState.prototype.sliderDragEnded = function() {
            if (juceAvailable && window.__JUCE__.backend)
                window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "sliderDragEnded" });
        };
        SliderState.prototype.handleEvent = function(event) {
            if (event.eventType === "valueChanged") {
                this.scaledValue = event.value;
                this.valueChangedListeners.forEach(function(fn) { fn(); });
            }
            if (event.eventType === "propertiesChanged") {
                var props = {};
                for (var k in event) { if (k !== "eventType") props[k] = event[k]; }
                this.properties = props;
            }
        };
        SliderState.prototype.getScaledValue = function() { return this.scaledValue; };
        SliderState.prototype.getNormalisedValue = function() {
            return Math.pow(
                (this.scaledValue - this.properties.start) / (this.properties.end - this.properties.start),
                this.properties.skew
            );
        };
        SliderState.prototype.normalisedToScaledValue = function(v) {
            return Math.pow(v, 1 / this.properties.skew) * (this.properties.end - this.properties.start) + this.properties.start;
        };
        SliderState.prototype.snapToLegalValue = function(v) {
            var i = this.properties.interval;
            if (i === 0) return v;
            var s = this.properties.start;
            return Math.max(s, Math.min(this.properties.end, s + i * Math.floor((v - s) / i + 0.5)));
        };
        SliderState.prototype.addValueChangedListener = function(fn) { this.valueChangedListeners.push(fn); };

        function ToggleState(name) {
            this.name = name;
            this.identifier = "__juce__toggle" + name;
            this.value = false;
            this.valueChangedListeners = [];
            var self = this;
            if (juceAvailable && window.__JUCE__.backend) {
                window.__JUCE__.backend.addEventListener(this.identifier, function(e) { self.handleEvent(e); });
                window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "requestInitialUpdate" });
            }
        }
        ToggleState.prototype.getValue  = function() { return this.value; };
        ToggleState.prototype.setValue  = function(v) {
            this.value = v;
            if (juceAvailable && window.__JUCE__.backend)
                window.__JUCE__.backend.emitEvent(this.identifier, { eventType: "valueChanged", value: this.value });
        };
        ToggleState.prototype.handleEvent = function(event) {
            if (event.eventType === "valueChanged") {
                this.value = event.value;
                this.valueChangedListeners.forEach(function(fn) { fn(); });
            }
        };
        ToggleState.prototype.addValueChangedListener = function(fn) { this.valueChangedListeners.push(fn); };

        var sliderStates = {}, toggleStates = {};
        window.Juce = window.Juce || {};
        window.Juce.getSliderState = function(name) {
            if (!sliderStates[name]) sliderStates[name] = new SliderState(name);
            return sliderStates[name];
        };
        window.Juce.getToggleState = function(name) {
            if (!toggleStates[name]) toggleStates[name] = new ToggleState(name);
            return toggleStates[name];
        };

        // ================================================================
        // BEADY EYE — Parameter binding & UI
        // ================================================================

        var parameterStates = {
            time: null, size: null, pitch: null, shape: null, density: null,
            feedback: null, dry_wet: null, reverb: null, output_vol: null,
            freeze: null, density_sync: null,
            time_atten: null, size_atten: null, pitch_atten: null, shape_atten: null
        };

        var knobUpdaters = {};

        document.addEventListener("DOMContentLoaded", function() {
            initializeKnobs();
            initializeFreezeButton();
            initializeDensitySyncButton();
            initializeGrainScope();
            initializeMeters();

            // Wrap density updater to also refresh sync division display
            var origDensityUpdater = knobUpdaters['density'];
            knobUpdaters['density'] = function(newValue, fromJuce) {
                origDensityUpdater(newValue, fromJuce);
                lastDensityNormalized = fromJuce ? newValue : (newValue + 1) / 2;
                updateSyncDivisionDisplay();
            };

            if (juceAvailable) initializeParameterStates();

            var dbg = document.getElementById('debug-status');
            if (dbg) {
                dbg.style.color = juceAvailable ? '#0C1816' : 'var(--text-dim)';
                dbg.textContent = juceAvailable ? 'JUCE:OK' : 'PREVIEW';
            }
        });

        function initializeParameterStates() {
            for (var paramName in parameterStates) {
                try {
                    parameterStates[paramName] = (paramName === 'freeze' || paramName === 'density_sync')
                        ? window.Juce.getToggleState(paramName)
                        : window.Juce.getSliderState(paramName);

                    if (knobUpdaters[paramName] && parameterStates[paramName]) {
                        (function(pName) {
                            var state   = parameterStates[pName];
                            var updater = knobUpdaters[pName];
                            var isToggle = (pName === 'freeze' || pName === 'density_sync');
                            state.addValueChangedListener(function() {
                                updater(isToggle ? (state.getValue() ? 1 : 0) : state.getNormalisedValue(), true);
                            });
                        })(paramName);
                    }
                } catch (error) {
                    console.warn("  failed: " + paramName + ": " + error.message);
                }
            }
        }

        // ================================================================
        // KNOB INITIALIZATION
        // ================================================================

        function initializeKnobs() {
            document.querySelectorAll('.knob-wrap[data-param]').forEach(function(w) { setupKnob(w); });
            document.querySelectorAll('.out-wrap[data-param]').forEach(function(w)  { setupKnob(w); });
        }

        function setupKnob(wrap) {
            var paramName      = wrap.dataset.param;
            var min            = parseFloat(wrap.dataset.min);
            var max            = parseFloat(wrap.dataset.max);
            var defaultValue   = parseFloat(wrap.dataset.default);
            var isBipolar      = wrap.dataset.bipolar === 'true';
            var unit           = wrap.dataset.unit || '';
            var attenParamName = wrap.dataset.atten || null;

            var value = defaultValue;
            var isDragging = false, startY = 0, startValue = 0;
            var attenValue = 0.0, attenEditMode = false;
            var isAttenDragging = false, attenStartY = 0, attenStartValue = 0;
            var currentNorm = (defaultValue - min) / (max - min);

            var svg          = wrap.querySelector('.knob-svg');
            var fillArc      = wrap.querySelector('.knob-fill');
            var trackEl      = wrap.querySelector('.knob-track');
            var attenPath    = attenParamName ? wrap.querySelector('.knob-atten') : null;
            var valueDisplay = document.getElementById(paramName + '-value') || wrap.querySelector('.knob-value');

            if (!svg || !fillArc) { console.warn("Knob " + paramName + ": missing SVG elements"); return; }

            var svgSize = parseInt(svg.getAttribute('width'));
            var cx = svgSize / 2, cy = svgSize / 2;

            // Arc max = 270° portion of track circumference (first number in dasharray)
            var arcMax = trackEl ? parseFloat(trackEl.getAttribute('stroke-dasharray')) : 113.1;
            var trackR = trackEl ? parseFloat(trackEl.getAttribute('r')) : 24;
            // Atten arc sits just outside the fill ring, inside the body
            var attenR = trackR + 5;
            // Any knob with a <path> fill element gets center-out bipolar arc; <circle> gets dasharray
            var isBipolarFill = fillArc.tagName.toLowerCase() === 'path';
            var isIndicator   = fillArc.classList.contains('knob-indicator');

            function updateFillArc(norm) {
                if (isIndicator) {
                    // Fixed 20° arc that rotates to the value position
                    var angle = 125 + norm * 270;
                    fillArc.setAttribute('transform', 'rotate(' + angle + ' ' + cx + ' ' + cy + ')');
                    return;
                }
                if (!isBipolarFill) {
                    fillArc.setAttribute('stroke-dasharray', (norm * arcMax).toFixed(2) + ' 999');
                    return;
                }
                // Center-out bipolar: 12 o'clock = zero, CW = positive, CCW = negative
                var deviation = norm - 0.5;
                var sweepDeg  = Math.abs(deviation) * 270; // max 135° each way
                if (sweepDeg < 0.5) { fillArc.setAttribute('d', ''); return; }
                var startRad = -Math.PI / 2; // 12 o'clock in SVG coords
                var endRad   = deviation > 0
                    ? startRad + sweepDeg * Math.PI / 180   // clockwise
                    : startRad - sweepDeg * Math.PI / 180;  // counter-clockwise
                var x1 = cx + trackR * Math.cos(startRad);
                var y1 = cy + trackR * Math.sin(startRad);
                var x2 = cx + trackR * Math.cos(endRad);
                var y2 = cy + trackR * Math.sin(endRad);
                // sweepDeg <= 135 so largeArc is always 0
                fillArc.setAttribute('d',
                    'M ' + x1.toFixed(2) + ' ' + y1.toFixed(2) +
                    ' A ' + trackR + ' ' + trackR + ' 0 0 ' + (deviation > 0 ? 1 : 0) + ' ' +
                    x2.toFixed(2) + ' ' + y2.toFixed(2));
            }

            function updateAttenPath() {
                if (!attenPath) return;
                if (attenValue < 0.005) {
                    attenPath.setAttribute('d', '');
                    attenPath.style.opacity = '0';
                    return;
                }
                // Arc centered on current value position, spanning ±(attenValue * 135°)
                var valueAngleDeg = 225 + currentNorm * 270;
                var halfSpan = attenValue * 135;
                var startDeg = valueAngleDeg - halfSpan;
                var endDeg   = valueAngleDeg + halfSpan;
                var span     = endDeg - startDeg;

                var startRad = (startDeg - 90) * Math.PI / 180;
                var endRad   = (endDeg   - 90) * Math.PI / 180;

                var x1 = cx + attenR * Math.cos(startRad);
                var y1 = cy + attenR * Math.sin(startRad);
                var x2 = cx + attenR * Math.cos(endRad);
                var y2 = cy + attenR * Math.sin(endRad);

                attenPath.setAttribute('d',
                    'M ' + x1.toFixed(2) + ' ' + y1.toFixed(2) +
                    ' A ' + attenR + ' ' + attenR + ' 0 ' + (span > 180 ? 1 : 0) + ' 1 ' +
                    x2.toFixed(2) + ' ' + y2.toFixed(2));
                attenPath.style.opacity = attenEditMode ? '0.92' : '0.62';
            }

            function updateKnob(newValue, fromJuce) {
                if (fromJuce) value = min + newValue * (max - min);
                else          value = Math.max(min, Math.min(max, newValue));

                var normalized = (value - min) / (max - min);
                currentNorm = normalized;

                updateFillArc(normalized);
                updateAttenPath();

                if (valueDisplay) {
                    if (attenEditMode) {
                        valueDisplay.textContent = 'R ' + Math.round(attenValue * 100) + '%';
                    } else if (unit === 'st') {
                        valueDisplay.textContent = (value >= 0 ? '+' : '') + value.toFixed(1) + ' st';
                    } else if (isBipolar) {
                        valueDisplay.textContent = value.toFixed(2);
                    } else {
                        valueDisplay.textContent = Math.round(normalized * 100) + '%';
                    }
                }

                if (!fromJuce && parameterStates[paramName]) {
                    try { parameterStates[paramName].setNormalisedValue(normalized); } catch (e) {}
                }
            }

            function updateAttenRing(val, fromJuce) {
                attenValue = Math.max(0, Math.min(1, val));
                updateAttenPath();
                if (valueDisplay && attenEditMode)
                    valueDisplay.textContent = 'R ' + Math.round(attenValue * 100) + '%';
                if (!fromJuce && attenParamName && parameterStates[attenParamName]) {
                    try { parameterStates[attenParamName].setNormalisedValue(attenValue); } catch (e) {}
                }
            }

            function enterAttenMode() {
                attenEditMode = true;
                if (attenPath) attenPath.classList.add('atten-active');
                if (valueDisplay) {
                    valueDisplay.classList.add('atten-mode');
                    valueDisplay.textContent = 'R ' + Math.round(attenValue * 100) + '%';
                }
                updateAttenPath();
            }

            function exitAttenMode() {
                attenEditMode = false;
                if (attenPath) attenPath.classList.remove('atten-active');
                if (valueDisplay) valueDisplay.classList.remove('atten-mode');
                updateKnob(value, false);
            }

            knobUpdaters[paramName] = updateKnob;
            if (attenParamName) {
                knobUpdaters[attenParamName] = function(v, fromJuce) { updateAttenRing(v, fromJuce); };
            }

            svg.addEventListener('mousedown', function(e) {
                e.preventDefault();
                if (attenParamName && e.shiftKey) {
                    if (attenEditMode) exitAttenMode(); else enterAttenMode();
                    return;
                }
                if (attenEditMode && attenParamName) {
                    isAttenDragging = true;
                    attenStartY = e.clientY; attenStartValue = attenValue;
                    if (parameterStates[attenParamName]) try { parameterStates[attenParamName].sliderDragStarted(); } catch (e) {}
                    return;
                }
                isDragging = true; startY = e.clientY; startValue = value;
                if (parameterStates[paramName]) try { parameterStates[paramName].sliderDragStarted(); } catch (e) {}
            });

            document.addEventListener('mousemove', function(e) {
                if (isAttenDragging) {
                    updateAttenRing(attenStartValue + (attenStartY - e.clientY) * 0.005, false);
                    return;
                }
                if (!isDragging) return;
                updateKnob(startValue + (startY - e.clientY) * (max - min) * 0.005, false);
            });

            document.addEventListener('mouseup', function() {
                if (isAttenDragging) {
                    isAttenDragging = false;
                    if (parameterStates[attenParamName]) try { parameterStates[attenParamName].sliderDragEnded(); } catch (e) {}
                }
                if (isDragging) {
                    isDragging = false;
                    if (parameterStates[paramName]) try { parameterStates[paramName].sliderDragEnded(); } catch (e) {}
                }
            });

            svg.addEventListener('dblclick', function() {
                if (attenEditMode) updateAttenRing(0, false);
                else updateKnob(defaultValue, false);
            });

            document.addEventListener('mousedown', function(e) {
                if (attenEditMode && !svg.contains(e.target)) exitAttenMode();
            }, true);

            updateKnob(defaultValue, false);
            if (attenPath) updateAttenRing(0, false);
        }

        // ================================================================
        // FREEZE BUTTON
        // ================================================================

        function initializeFreezeButton() {
            var freezeBtn = document.getElementById('freeze-btn');
            var freezeActive = false;
            freezeBtn.addEventListener('click', function() {
                freezeActive = !freezeActive;
                freezeBtn.classList.toggle('active', freezeActive);
                if (parameterStates.freeze) try { parameterStates.freeze.setValue(freezeActive); } catch (e) {}
            });
            knobUpdaters['freeze'] = function(v, fromJuce) {
                if (fromJuce) { freezeActive = v > 0.5; freezeBtn.classList.toggle('active', freezeActive); }
            };
        }

        // ================================================================
        // DENSITY SYNC TOGGLE
        // ================================================================

        var syncDivisionNames = ['/4', '/3', '/2', '/1', 'x1.5', 'x2', 'x3', 'x4'];
        var densitySyncActive = false;
        var lastDensityNormalized = 0.5;

        function getSyncDivisionName(dn) {
            var dv = dn * 2 - 1, ad = Math.abs(dv);
            if (ad < 0.05) return '—';
            return syncDivisionNames[Math.max(0, Math.min(7, Math.round((ad - 0.05) / 0.95 * 7)))];
        }

        function updateSyncDivisionDisplay() {
            var divEl = document.getElementById('sync-division');
            if (!divEl) return;
            divEl.style.display = densitySyncActive ? 'inline' : 'none';
            if (densitySyncActive) divEl.textContent = getSyncDivisionName(lastDensityNormalized);
        }

        function initializeDensitySyncButton() {
            var syncBtn = document.getElementById('density-sync-btn');
            syncBtn.addEventListener('click', function() {
                densitySyncActive = !densitySyncActive;
                syncBtn.classList.toggle('active', densitySyncActive);
                syncBtn.textContent = densitySyncActive ? 'SYNC' : 'FREE';
                updateSyncDivisionDisplay();
                if (parameterStates.density_sync) try { parameterStates.density_sync.setValue(densitySyncActive); } catch (e) {}
            });
            knobUpdaters['density_sync'] = function(v, fromJuce) {
                if (fromJuce) {
                    densitySyncActive = v > 0.5;
                    syncBtn.classList.toggle('active', densitySyncActive);
                    syncBtn.textContent = densitySyncActive ? 'SYNC' : 'FREE';
                    updateSyncDivisionDisplay();
                }
            };
        }

        // ================================================================
        // GRAIN SCOPE — multi-harmonic waveform, amplitude driven by activeGrains
        // ================================================================

        function initializeGrainScope() {
            var canvas = document.getElementById('grain-scope');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var W = canvas.width, H = canvas.height;
            var activeGrainCount = 0;
            var frame = 0;

            function draw() {
                frame++;
                ctx.clearRect(0, 0, W, H);
                var n = Math.min(Math.max(activeGrainCount, 0), 32);
                var t = frame * 0.012;

                if (n < 1) {
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(122,168,160,0.15)';
                    ctx.lineWidth = 1;
                    ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2);
                    ctx.stroke();
                } else {
                    var amp = (H / 2 - 3) * (n / 32) * 0.80;
                    var complexity = 1.5 + n * 0.12;
                    ctx.beginPath();
                    for (var x = 0; x <= W; x++) {
                        var p = (x / W) * Math.PI * 2;
                        var y = H / 2;
                        y += Math.sin(p * complexity       + t        ) * amp * 0.50;
                        y += Math.sin(p * complexity * 2.1 + t * 1.27 ) * amp * 0.24;
                        y += Math.sin(p * complexity * 3.8 + t * 0.71 ) * amp * 0.14;
                        y += Math.sin(p * complexity * 5.3 - t * 1.09 ) * amp * 0.08;
                        y += Math.sin(p * complexity * 7.1 + t * 0.53 ) * amp * 0.04;
                        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.strokeStyle = 'rgba(122,168,160,0.72)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
                requestAnimationFrame(draw);
            }
            draw();

            window.updateGrainVisualization = function(activeGrains, density, shape) {
                activeGrainCount = activeGrains;
                var gc = document.getElementById('grain-count');
                if (gc) gc.textContent = activeGrains;
            };

            if (!juceAvailable) {
                setInterval(function() {
                    var frozen = document.getElementById('freeze-btn').classList.contains('active');
                    activeGrainCount = frozen ? 0 : Math.floor(Math.random() * 14 + 1);
                    var gc = document.getElementById('grain-count');
                    if (gc) gc.textContent = activeGrainCount;
                }, 150);
            }
        }

        // ================================================================
        // METERS
        // ================================================================

        function initializeMeters() {
            window.updateMeters = function(inputLevel, outputLevel) {
                var inEl  = document.getElementById('meter-in');
                var outEl = document.getElementById('meter-out');
                if (inEl)  inEl.style.height  = (inputLevel  * 100) + '%';
                if (outEl) outEl.style.height = (outputLevel * 100) + '%';
            };
        }

    })();
    </script>

</body>
</html>
